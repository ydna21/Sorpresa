<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Noche Mágica 🌃🎆</title>
<style>
  body { margin: 0; background: #000103; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 30px; width: 100%; text-align: center;
    z-index: 10; pointer-events: none;
  }
  h1 { 
    font-size: 2.2rem; color: #ffd700; text-shadow: 0 0 20px #ff0000, 0 0 40px #ffd700;
    margin: 0; animation: glow 2s ease-in-out infinite alternate;
  }
  /* Eliminamos el estilo de la frase instructiva */

  @keyframes glow { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }

  .skyline {
    position: fixed; bottom: 30%; left: 0; width: 100%; height: 110px;
    z-index: 5; pointer-events: none; display: flex; align-items: flex-end; justify-content: space-around;
    transition: filter 0.2s ease; /* Para el efecto de iluminación global */
  }
  .building {
    background: #05050a; width: 50px; position: relative;
    box-shadow: 0 0 10px rgba(0,0,0,1);
    transition: background 0.2s ease; /* Iluminación de los edificios */
  }
  .window {
    position: absolute; width: 4px; height: 4px; background: #111; border-radius: 1px;
  }
  .window.on { background: #ffd700; box-shadow: 0 0 8px #ffd700; }

  #botones {
    position: fixed; bottom: 30px; width: 100%; display: flex;
    justify-content: center; gap: 15px; z-index: 20;
  }
  .btn {
    padding: 12px 25px; background: rgba(0,0,0,0.8); color: #ffd700;
    border: 2px solid #ff0000; border-radius: 50px; cursor: pointer;
    font-weight: bold; transition: 0.3s; text-decoration: none;
  }
  .btn:hover { background: #ff0000; color: white; box-shadow: 0 0 30px #ff0000; }
</style>
</head>
<body>

<audio id="sfxFirework">
  <source src="sfx_firework.mp3" type="audio/mpeg">
</audio>

<div id="ui">
  <h1>Nuestra Noche Eterna 💖</h1>
  </div>

<div class="skyline" id="skyline"></div>

<canvas id="canvas"></canvas>

<div id="botones">
  <a href="hilo_rojo.html" class="btn">🧵 Volver al Hilo</a>
  <a href="index.html" class="btn" style="border-color: #444; color: #888;">🏠 Inicio</a>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const sfx = document.getElementById('sfxFirework');
const skyline = document.getElementById('skyline');
let fireworks = [];
let particles = [];
let stars = [];
let flashAlpha = 0; // Para el efecto de flash de explosión

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  generarEstrellas();
  generarCiudad();
}

function generarEstrellas() {
  stars = [];
  for(let i=0; i<150; i++) {
    stars.push({ x: Math.random()*canvas.width, y: Math.random()*(canvas.height*0.7), r: Math.random()*1.5, o: Math.random() });
  }
}

function generarCiudad() {
  skyline.innerHTML = '';
  let x = 0;
  while (x < window.innerWidth) {
    const w = 40 + Math.random() * 70;
    const h = 60 + Math.random() * 120;
    const b = document.createElement('div');
    b.className = 'building';
    b.style.width = w + 'px';
    b.style.height = h + 'px';
    for(let i=0; i<15; i++) {
      const win = document.createElement('div');
      win.className = 'window' + (Math.random() > 0.8 ? ' on' : '');
      win.style.left = Math.random() * (w-8) + 4 + 'px';
      win.style.top = Math.random() * (h-8) + 4 + 'px';
      b.appendChild(win);
    }
    skyline.appendChild(b);
    x += w + 10;
  }
}

class Firework {
  constructor(sx, sy, tx, ty) {
    this.x = sx; this.y = sy; this.tx = tx; this.ty = ty;
    this.vx = (tx - sx) / 50; this.vy = (ty - sy) / 50;
    this.hue = Math.random() * 360;
  }
  update(i) {
    this.x += this.vx; this.y += this.vy;
    if (Math.abs(this.x - this.tx) < 5 && Math.abs(this.y - this.ty) < 5) {
      explode(this.tx, this.ty, this.hue);
      fireworks.splice(i, 1);
      if(sfx) { sfx.currentTime = 0; sfx.play().catch(()=>{}); }
      flashAlpha = 0.2; // Activamos el flash
      iluminarCiudad(this.hue); // Iluminamos la ciudad
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2);
    ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
    ctx.fill();
    ctx.shadowBlur = 10; ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
  }
}

class Particle {
  constructor(x, y, hue, type) {
    this.x = x; this.y = y; this.hue = hue; this.type = type;
    this.alpha = 1; this.decay = 0.005 + Math.random() * 0.015;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = Math.random() * 8 + 1;
    this.friction = 0.97; this.gravity = 0.12;
    
    if (this.type === 'willow') {
      this.gravity = 0.03; this.speed = 1.5 + Math.random() * 2; this.friction = 0.99;
    }
    if (this.type === 'heart') {
      this.hue = 40; // Dorado
      this.speed = 2; this.gravity = 0.05;
      let t = Math.random() * Math.PI * 2;
      this.targetX = 16 * Math.pow(Math.sin(t), 3);
      this.targetY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    }
  }
  update(i) {
    if (this.type === 'heart') {
      this.x += this.targetX * 0.1; this.y += this.targetY * 0.1;
    } else {
      this.speed *= this.friction;
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed + this.gravity;
    }
    this.alpha -= this.decay;
    if (this.alpha <= 0) particles.splice(i, 1);
  }
  draw() {
    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha})`;
    ctx.beginPath(); ctx.arc(this.x, this.y, (this.type === 'willow' ? 3 : 2), 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = (this.type === 'willow' ? 5 : 0); ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
    
    // Reflejo en el agua
    if (this.y < canvas.height * 0.7) {
      ctx.fillStyle = `hsla(${this.hue}, 100%, 40%, ${this.alpha * 0.2})`;
      ctx.beginPath(); ctx.arc(this.x, canvas.height - (this.y * 0.3), 1.5, 0, Math.PI*2); ctx.fill();
    }
  }
}

function explode(x, y, hue) {
  let count = 120;
  let type = Math.random() > 0.8 ? 'heart' : (Math.random() > 0.5 ? 'willow' : 'normal');
  while (count--) particles.push(new Particle(x, y, hue, type));
}

function iluminarCiudad(hue) {
  const buildings = document.querySelectorAll('.building');
  buildings.forEach(b => {
    b.style.background = `hsl(${hue}, 80%, 15%)`;
  });
  skyline.style.filter = `drop-shadow(0 0 15px hsl(${hue}, 100%, 70%))`;
  setTimeout(() => {
    buildings.forEach(b => b.style.background = '#05050a');
    skyline.style.filter = 'none';
  }, 250);
}

function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(Date.now()*0.001 + s.o))})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height * 0.7);
    flashAlpha -= 0.05; // Se desvanece rápido
  }
}

function loop() {
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // Rastro más largo para las estelas
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = 'lighter';
  
  drawStars();
  drawFlash();
  
  // Línea del horizonte (agua)
  ctx.fillStyle = '#000105';
  ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);

  fireworks.forEach((f, i) => { f.draw(); f.update(i); });
  particles.forEach((p, i) => { p.draw(); p.update(i); });

  if (Math.random() < 0.01) { // Menos automático para que los clics destaquen
    fireworks.push(new Firework(canvas.width/2, canvas.height, Math.random()*canvas.width, Math.random()*(canvas.height*0.5)));
  }
  requestAnimationFrame(loop);
}

canvas.addEventListener('click', (e) => {
  fireworks.push(new Firework(canvas.width/2, canvas.height, e.clientX, e.clientY));
});

window.addEventListener('resize', init);
init();
loop();
</script>
</body>
</html>
