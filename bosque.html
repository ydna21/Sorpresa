<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Bosque Mágico de Nuestros Recuerdos ✨</title>
<style>
  body { 
    margin: 0; padding: 0; background: #000; 
    overflow: hidden; font-family: 'Courier New', monospace; color: white; 
  }
  
  /* Capa de entrada 2D (Fondo radial profundo) */
  #entrada2D {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #0a192f 0%, #000000 100%);
    z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 2.5s ease-in-out, transform 2.5s ease-in-out;
  }

  /* Contenedor del árbol emoji original */
  .tree-container {
    text-align: center; cursor: pointer;
    animation: float 4s ease-in-out infinite;
  }
  .tree-emoji { 
    font-size: 8rem; 
    filter: drop-shadow(0 0 20px rgba(173, 255, 47, 0.6)); 
  }
  .hint { 
    font-size: 1.2rem; color: #adff2f; margin-top: 10px; 
    text-shadow: 0 0 10px #adff2f; font-weight: bold;
  }
  @keyframes float { 
    0%, 100% { transform: translateY(0); } 
    50% { transform: translateY(-15px); } 
  }

  /* Modal Polaroid Original */
  #modalCarta {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 20; flex-direction: column; 
    align-items: center; justify-content: center;
  }
  .polaroid {
    background: white; padding: 15px 15px 50px 15px; border-radius: 5px;
    box-shadow: 0 0 40px rgba(173, 255, 47, 0.3); transform: rotate(-3deg);
    max-width: 80%; text-align: center; color: #333; position: relative;
    animation: aparecerCarta 0.5s ease-out;
  }
  @keyframes aparecerCarta {
    from { opacity: 0; transform: translateY(50px) rotate(-10deg); }
    to { opacity: 1; transform: translateY(0) rotate(-3deg); }
  }
  .polaroid img { 
    width: 100%; max-width: 300px; height: auto; border: 1px solid #ddd; 
  }
  .polaroid-text { 
    margin-top: 20px; font-size: 1.3rem; font-weight: bold; 
    font-family: 'Courier New', monospace; color: #050b14;
  }
  
  /* Botón "Guardar Recuerdo" modificado para el viaje */
  .btn-viaje {
    margin-top: 30px; padding: 12px 25px; background: #adff2f; color: #050b14;
    border: none; border-radius: 20px; font-size: 1.1rem; cursor: pointer; 
    font-weight: bold; box-shadow: 0 0 15px rgba(173, 255, 47, 0.5);
    transition: all 0.3s;
  }
  .btn-viaje:hover { transform: scale(1.05); box-shadow: 0 0 30px #adff2f; }
  
  /* El Lienzo del Mundo 3D */
  #threeCanvas { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    z-index: 1; display: none; /* Oculto al inicio */
  }

  /* Botón para regresar al inicio (visible en 3D) */
  .btn-volver {
     position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
     z-index: 15; padding: 12px 25px; background: transparent; 
     border: 2px solid #adff2f; color: #adff2f; border-radius: 25px; 
     cursor: pointer; font-family: 'Courier New', monospace; font-size: 1rem;
     transition: all 0.3s; display: none; /* Oculto al inicio */
  }
  .btn-volver:hover { background: #adff2f; color: #050b14; box-shadow: 0 0 20px #adff2f; }
</style>
</head>
<body>

<div id="entrada2D">
  <div class="tree-container" id="arbolMagico">
    <div class="tree-emoji">🌲</div>
    <div class="hint">Toca el árbol</div>
  </div>
</div>

<div id="modalCarta">
  <div class="polaroid">
    <img src="src_bosque/foto_bosque.jpg" alt="Nuestro recuerdo" onerror="this.src='https://via.placeholder.com/300x350?text=Tu+Foto+Aqui'">
    <div class="polaroid-text">Cada momento contigo es mágico ✨</div>
  </div>
  <button class="btn-viaje" id="btnEmpezarViaje">Guardar recuerdo ✨</button>
</div>

<div id="threeCanvas"></div>

<button class="btn-volver" id="btnVolverInicio">⬅️ Volver al inicio</button>

<audio id="musicaBosque" loop>
  <source src="src_bosque/musica3.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // ==========================================
  // LÓGICA DE TRANSICIÓN Y AUDIO
  // ==========================================
  const entrada2D = document.getElementById('entrada2D');
  const arbol = document.getElementById('arbolMagico');
  const modal = document.getElementById('modalCarta');
  const btnViaje = document.getElementById('btnEmpezarViaje');
  const canvas3D = document.getElementById('threeCanvas');
  const btnVolver = document.getElementById('btnVolverInicio');
  const audio = document.getElementById('musicaBosque');

  // Asegurar que OrbitControls funcione
  const OrbitControls = THREE.OrbitControls;

  // Lógica del Árbol y Modal (Original)
  arbol.addEventListener('click', () => {
    modal.style.display = 'flex';
  });

  // El Gran Viaje 3D
  btnViaje.addEventListener('click', () => {
    // 1. Cerrar modal rápidamente
    modal.style.display = 'none';
    
    // 2. Reproducir música (forzado)
    audio.play().catch(e => console.log("Audio bloqueado"));

    // 3. Efecto visual de desvanecido y zoom out
    entrada2D.style.opacity = '0';
    entrada2D.style.transform = 'scale(0.8)';
    
    // 4. Mostrar el mundo 3D
    canvas3D.style.display = 'block';

    // 5. Iniciar motor 3D y animación de cámara entrada
    init3DWorld();

    // 6. Ocultar capa 2D completamente y mostrar botón volver
    setTimeout(() => {
      entrada2D.style.display = 'none';
      btnVolver.style.display = 'block';
    }, 2500);
  });

  btnVolver.addEventListener('click', () => {
    window.location.href = 'index.html';
  });


  // ==========================================
  // MOTOR DEL MUNDO BOSQUE 3D (THREE.JS)
  // ==========================================
  let scene, camera, renderer, controls, firefliesSystem;
  let worldInitialized = false;

  function init3DWorld() {
    if (worldInitialized) return;
    worldInitialized = true;

    const width = window.innerWidth;
    const height = window.innerHeight;

    // SCENE & FOG (Niebla mágica azul)
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000105);
    scene.fog = new THREE.FogExp2(0x050b14, 0.002);

    // CAMERA (Colocada lejos para la animación de entrada)
    camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 10000);
    camera.position.set(0, 100, 800); 

    // RENDERER
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    canvas3D.appendChild(renderer.domElement);

    // CONTROLS
    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 50;
    controls.maxDistance = 1500;
    controls.maxPolarAngle = Math.PI / 2 - 0.1; // No bajar del suelo
    controls.enabled = false; // Bloqueado durante la intro

    // LIGHTS
    const ambientLight = new THREE.AmbientLight(0x1a2a40, 1.2); // Luz ambiental azul noche
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xadff2f, 2, 800); // Sol verde luciérnaga central
    sunLight.position.set(0, 150, 0);
    scene.add(sunLight);

    // --- ELEMENTOS DEL MUNDO ---

    // 1. EL SUELO (Círculo verde oscuro texturizado)
    const groundGeometry = new THREE.CircleGeometry(1000, 64);
    const groundMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x051a05, // Verde bosque muy oscuro
      roughness: 1,
      metalness: 0
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 2. EL LAGO (Círculo azul brillante central)
    const lakeGeometry = new THREE.CircleGeometry(250, 64);
    const lakeMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x00bfff, // Azul profundo brillante
      emissive: 0x001a33, 
      roughness: 0.1,
      metalness: 0.9,
      transparent: true,
      opacity: 0.8
    });
    const lake = new THREE.Mesh(lakeGeometry, lakeMaterial);
    lake.rotation.x = -Math.PI / 2;
    lake.position.y = 1; // Un poco arriba del suelo
    scene.add(lake);

    const lakeLight = new THREE.PointLight(0x00bfff, 3, 300); // Luz azul del lago
    lakeLight.position.set(0, 10, 0);
    scene.add(lakeLight);

    // 3. ANIMALITO MÁGICO (Conejito Sprite Brillante)
    const textureLoader = new THREE.TextureLoader();
    // IMPORTANTE: Asegúrate de tener 'src_bosque/bunny.png' (fondo transparente)
    // Usaremos un emoji brillante como fallback si no carga la foto
    textureLoader.load('src_bosque/bunny.png', (texture) => {
      const bunnyMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const bunny = new THREE.Sprite(bunnyMaterial);
      bunny.scale.set(40, 40, 1);
      bunny.position.set(200, 20, 100); // Cerca del lago
      scene.add(bunny);

      const bunnyLight = new THREE.PointLight(0xffffff, 1.5, 100); // Luz propia del conejito
      bunny.add(bunnyLight);
    }, undefined, () => {
      // FALLBACK: Si no hay foto, ponemos una esfera de luz mágica
      const sphereGeo = new THREE.SphereGeometry(15, 16, 16);
      const sphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const magicSphere = new THREE.Mesh(sphereGeo, sphereMat);
      magicSphere.position.set(200, 15, 100);
      scene.add(magicSphere);
       const bunnyLight = new THREE.PointLight(0xffffff, 2, 100);
      magicSphere.add(bunnyLight);
    });

    // 4. LUCIÉRNAGAS 3D (Sistema de partículas)
    const firefliesGeometry = new THREE.BufferGeometry();
    const firefliesPositions = [];
    const firefliesColors = [];
    const numFireflies3D = 500;

    for (let i = 0; i < numFireflies3D; i++) {
      // Posiciones aleatorias en un volumen grande
      firefliesPositions.push((Math.random() - 0.5) * 2000, Math.random() * 400, (Math.random() - 0.5) * 2000);
      
      // Color verde neón con variaciones
      firefliesColors.push(0.6 + Math.random() * 0.4, 1.0, 0.1 + Math.random() * 0.3);
    }

    firefliesGeometry.setAttribute('position', new THREE.Float32BufferAttribute(firefliesPositions, 3));
    firefliesGeometry.setAttribute('color', new THREE.Float32BufferAttribute(firefliesColors, 3));

    const firefliesMaterial = new THREE.PointsMaterial({ 
      size: 6, 
      vertexColors: true, 
      transparent: true, 
      opacity: 0.9,
      blending: THREE.AdditiveBlending // Brillo neón
    });

    firefliesSystem = new THREE.Points(firefliesGeometry, firefliesMaterial);
    scene.add(firefliesSystem);

    animate();
    
    // --- ANIMACIÓN DE ENTRADA DE CÁMARA ("El Viaje") ---
    // Usaremos una animación simple de lerp para volar hacia el lago
    introAnimationActive = true;
    prevTime = Date.now();
  }

  let introAnimationActive = false;
  let viajeProgress = 0;
  let prevTime;

  function animate() {
    requestAnimationFrame(animate);
    const time = Date.now();
    const delta = (time - prevTime) / 1000;
    prevTime = time;

    // Lógica de Animación de Entrada
    if (introAnimationActive) {
      viajeProgress += delta * 0.4; // Velocidad del viaje
      if (viajeProgress > 1) {
        viajeProgress = 1;
        introAnimationActive = false;
        controls.enabled = true; // Desbloquear controles
      }
      
      // Interpolación suave (Easing)
      const t = Math.pow(viajeProgress, 3); // Ease out

      const targetX = 0; const targetY = 200; const targetZ = 600;
      camera.position.x = THREE.MathUtils.lerp(0, targetX, t);
      camera.position.y = THREE.MathUtils.lerp(100, targetY, t);
      camera.position.z = THREE.MathUtils.lerp(800, targetZ, t);
      camera.lookAt(0, 0, 0); // Mirar al lago central
    } else {
      controls.update();
    }

    // Animación de Luciérnagas 3D
    if (firefliesSystem) {
      firefliesSystem.rotation.y += 0.0005; // Rotación lenta del sistema
      const positions = firefliesSystem.geometry.getAttribute('position').array;
      for (let i = 0; i < numFireflies3D; i++) {
        // Movimiento flotante individual
        positions[i * 3 + 1] += Math.sin(time * 0.001 + positions[i * 3]) * 0.1;
      }
      firefliesSystem.geometry.getAttribute('position').needsUpdate = true;
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    if (!worldInitialized) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

</script>
</body>
</html>
