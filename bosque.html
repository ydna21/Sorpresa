<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Bosque Mágico de Nuestros Recuerdos ✨</title>
<style>
  body { 
    margin: 0; padding: 0; background: #000; 
    overflow: hidden; font-family: 'Courier New', monospace; color: white; 
  }
  
  /* ================== FASE 1: 2D INICIAL ================== */
  #fase2D {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #0a192f 0%, #000000 100%);
    z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 2s ease-in-out, transform 2s ease-in-out;
  }

  /* Canvas Luciérnagas 2D */
  #canvasBosque2D { 
    display: block; position: absolute; top: 0; left: 0; 
    z-index: 11; pointer-events: none; 
  }

  .tree-container {
    text-align: center; cursor: pointer; z-index: 12;
    animation: float 4s ease-in-out infinite;
  }
  .tree-emoji { font-size: 8rem; filter: drop-shadow(0 0 20px rgba(173, 255, 47, 0.6)); transition: transform 0.3s;}
  .tree-emoji:hover { transform: scale(1.1); filter: drop-shadow(0 0 40px rgba(173, 255, 47, 1)); }
  .hint { font-size: 1.2rem; color: #adff2f; margin-top: 10px; text-shadow: 0 0 10px #adff2f; font-weight: bold; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  /* ================== MODALES Y CARTAS ================== */
  /* Estilo base para todos los modales */
  .modal-style {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 50; flex-direction: column; 
    align-items: center; justify-content: center; opacity: 1; transition: opacity 1s ease;
  }
  /* Estilo base para las polaroids/cartas */
  .card-style {
    background: white; padding: 15px 15px 50px 15px; border-radius: 5px;
    box-shadow: 0 0 40px rgba(173, 255, 47, 0.3); transform: rotate(-3deg);
    max-width: 80%; text-align: center; color: #333; position: relative;
    animation: aparecerCarta 0.5s ease-out;
  }
  @keyframes aparecerCarta { from { opacity: 0; transform: translateY(50px) rotate(-10deg); } to { opacity: 1; transform: translateY(0) rotate(-3deg); } }
  
  .card-style img { width: 100%; max-width: 300px; height: auto; border: 1px solid #ddd; }
  .card-style-text { margin-top: 20px; font-size: 1.3rem; font-weight: bold; font-family: 'Courier New', monospace; color: #050b14; max-width: 400px; line-height: 1.4; }
  
  /* Botones base */
  .btn-base {
    margin-top: 30px; padding: 12px 25px; background: #adff2f; color: #050b14;
    border: none; border-radius: 20px; font-size: 1.1rem; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px rgba(173, 255, 47, 0.5); transition: all 0.3s;
  }
  .btn-base:hover { transform: scale(1.05); box-shadow: 0 0 30px #adff2f; }

  /* ================== FASE 3: MUNDO 3D ================== */
  #threeCanvas { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    z-index: 1; display: none; /* Oculto al inicio */
  }

  /* Botón para regresar al inicio (visible en 3D) */
  .btn-volver {
     position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
     z-index: 20; padding: 12px 25px; background: rgba(0,0,0,0.5); 
     border: 2px solid #adff2f; color: #adff2f; border-radius: 25px; 
     cursor: pointer; font-family: 'Courier New', monospace; font-size: 1rem;
     transition: all 0.3s; display: none; /* Oculto al inicio */
  }
  .btn-volver:hover { background: #adff2f; color: #050b14; box-shadow: 0 0 20px #adff2f; }
</style>
</head>
<body>

<audio id="musicaBosque" loop>
  <source src="src_bosque/musica3.mp3" type="audio/mpeg">
</audio>

<div id="fase2D">
  <canvas id="canvasBosque2D"></canvas>
  <div class="tree-container" id="arbolMagico">
    <div class="tree-emoji">🌲</div>
    <div class="hint">Toca el árbol</div>
  </div>
</div>

<div class="modal-style" id="modalCarta">
  <div class="card-style">
    <img src="src_bosque/foto_bosque.jpg" alt="Nuestro recuerdo" onerror="this.src='https://via.placeholder.com/300x350?text=Tu+Foto+Aqui'">
    <div class="card-style-text">Cada momento contigo es mágico ✨</div>
  </div>
  <button class="btn-base" id="btnEmpezarViaje">Guardar recuerdo ✨</button>
</div>


<div class="modal-style" id="modalCartaFinal">
  <div class="card-style" style="transform: rotate(2deg);">
    <div class="card-style-text" style="font-size: 1.1rem; padding: 10px;">
      eres lo mas bonito que me a podido pasar en esta vida❤️, nunca dude del amor que te tengo❤️ gracias por todo❤️
    </div>
  </div>
  <button class="btn-base" id="btnCerrarCartaFinal">Gracias ❤️</button>
</div>

<div class="modal-style" id="modalFlorAmarilla">
  <div class="card-style" style="transform: rotate(0deg); background: none; box-shadow: none;">
    <div id="flowerCanvasContainer" style="display: flex; justify-content: center; filter: drop-shadow(0 0 15px yellow);"></div>
    <div class="card-style-text" style="background: white; padding: 10px 20px; border-radius: 15px; margin-top: 15px; box-shadow: 0 0 20px rgba(255,255,0,0.4);">
      una flor amarilla para ti mi amor ❤️
    </div>
  </div>
</div>


<div id="threeCanvas"></div>

<button class="btn-volver" id="btnVolverInicio">⬅️ Volver al inicio</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // ==========================================
  // LÓGICA DE CONTROL GLOBAL Y MÚSICA
  // ==========================================
  const audio = document.getElementById('musicaBosque');
  
  function reproducirMusica() {
    if (audio.paused) {
      audio.play().then(() => {
        window.removeEventListener('click', reproducirMusica);
        window.removeEventListener('touchstart', reproducirMusica);
      }).catch(e => console.log("Aún esperando interacción"));
    }
  }
  // Reproducir al primer toque en cualquier lado
  window.addEventListener('click', reproducirMusica);
  window.addEventListener('touchstart', reproducirMusica);


  // ==========================================
  // MOTOR 2D: LUCIÉRNAGAS INICIALES (Fase 1)
  // ==========================================
  const canvas2D = document.getElementById('canvasBosque2D');
  const ctx2D = canvas2D.getContext('2d');
  canvas2D.width = window.innerWidth;
  canvas2D.height = window.innerHeight;

  let fireflies2D = [];
  const numFireflies2D = window.innerWidth < 768 ? 80 : 150; 
  let mouse2D = { x: null, y: null };
  let animacion2DActiva = true; 
  let idAnimacion2D;

  window.addEventListener('mousemove', (e) => { mouse2D.x = e.clientX; mouse2D.y = e.clientY; });
  window.addEventListener('touchmove', (e) => { mouse2D.x = e.touches[0].clientX; mouse2D.y = e.touches[0].clientY; });

  class Firefly2D {
    constructor() {
      this.x = Math.random() * canvas2D.width;
      this.y = Math.random() * canvas2D.height;
      this.size = Math.random() * 2 + 0.5;
      this.speedX = Math.random() * 1 - 0.5;
      this.speedY = Math.random() * 1 - 0.5;
      this.angle = Math.random() * Math.PI * 2;
      this.opacity = Math.random();
      this.fadeSpeed = Math.random() * 0.02 + 0.01;
      this.baseColor = Math.random() > 0.5 ? '173, 255, 47' : '152, 251, 152'; 
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      this.angle += 0.05; this.opacity += Math.sin(this.angle) * this.fadeSpeed; 
      if (this.x < 0 || this.x > canvas2D.width) this.speedX *= -1;
      if (this.y < 0 || this.y > canvas2D.height) this.speedY *= -1;

      if (mouse2D.x != null && mouse2D.y != null) {
        let dx = mouse2D.x - this.x; let dy = mouse2D.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 100) { this.x -= dx * 0.02; this.y -= dy * 0.02; }
      }
    }
    draw() {
      ctx2D.beginPath();
      ctx2D.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx2D.fillStyle = `rgba(${this.baseColor}, ${Math.abs(this.opacity)})`;
      ctx2D.shadowBlur = 10; ctx2D.shadowColor = `rgba(${this.baseColor}, 1)`;
      ctx2D.fill();
    }
  }

  for (let i = 0; i < numFireflies2D; i++) fireflies2D.push(new Firefly2D());

  function animate2D() {
    if (!animacion2DActiva) return;
    ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height);
    fireflies2D.forEach(f => { f.update(); f.draw(); });
    idAnimacion2D = requestAnimationFrame(animate2D);
  }
  animate2D();


  // ==========================================
  // LÓGICA DE TRANSICIÓN Y VIAJE (Fase 1 -> Fase 3)
  // ==========================================
  const arbol = document.getElementById('arbolMagico');
  const modalCarta = document.getElementById('modalCarta');
  const btnViaje = document.getElementById('btnEmpezarViaje');
  const fase2D = document.getElementById('fase2D');
  const canvas3DContenedor = document.getElementById('threeCanvas');
  const btnVolver = document.getElementById('btnVolverInicio');

  arbol.addEventListener('click', (e) => {
    e.stopPropagation();
    modalCarta.style.display = 'flex';
    reproducirMusica();
  });

  btnViaje.addEventListener('click', () => {
    modalCarta.style.display = 'none'; // Cerrar modal rápido
    fase2D.style.opacity = '0'; // Desvanecer motor 2D
    fase2D.style.transform = 'scale(0.8)';
    canvas3DContenedor.style.display = 'block'; // Mostrar motor 3D por debajo

    iniciarMundo3D(); // Arrancar motor 3D

    setTimeout(() => {
      fase2D.style.display = 'none';
      animacion2DActiva = false; // Apagar Luciérnagas 2D
      cancelAnimationFrame(idAnimacion2D);
      btnVolver.style.display = 'block';
    }, 2000);
  });

  // Botón Volver al inicio (en 3D)
  btnVolver.addEventListener('click', () => window.location.href = 'index.html');


  // ==========================================
  // MOTOR MUNDO BOSQUE 3D (Three.js - Fase 3)
  // ==========================================
  let scene, camera, renderer, controls, lakeMesh;
  let raycaster, mouse = new THREE.Vector2(); // Para interacción 3D

  function iniciarMundo3D() {
    const contenedor = document.getElementById('threeCanvas');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02040a); // Fondo oscuro profundo
    scene.fog = new THREE.FogExp2(0x02040a, 0.003); // Niebla mágica

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 50, 200); // Cámara cerca del suelo

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    contenedor.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.05; // No ver por debajo
    controls.minDistance = 30;
    controls.maxDistance = 600;

    // LUCES
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); // Luz ambiental azul noche suave
    scene.add(ambientLight);
    const luzLago = new THREE.PointLight(0x00bfff, 3, 300); // Luz azul del lago
    luzLago.position.set(0, 20, 0);
    scene.add(luzLago);

    // --- ELEMENTOS DEL MUNDO ---
    // 1. EL SUELO DEL BOSQUE (Plano verde oscuro)
    const groundGeo = new THREE.PlaneGeometry(1000, 1000);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x051a05, roughness: 1 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 2. EL LAGO BRILLANTE (Círculo azul brillante central)
    const lagoGeo = new THREE.CircleGeometry(60, 64);
    const lagoMat = new THREE.MeshBasicMaterial({ color: 0x00bfff, transparent: true, opacity: 0.9, emissive: 0x00bfff });
    lakeMesh = new THREE.Mesh(lagoGeo, lagoMat);
    lakeMesh.rotation.x = -Math.PI / 2;
    lakeMesh.position.y = 0.6; // Arriba del suelo
    scene.add(lakeMesh);

    // 3. ANIMALITO MÁGICO (Sprite)
    const textureLoader = new THREE.TextureLoader();
    textureLoader.load('src_bosque/bunny.png', (texture) => {
      const bunnyMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const bunny = new THREE.Sprite(bunnyMat);
      bunny.scale.set(30, 30, 1);
      bunny.position.set(60, 15, 30); // Cerca del lago
      scene.add(bunny);
    }, undefined, () => {
      // Fallback: Si no hay foto, pone esfera de luz
      const bolaLuz = new THREE.Mesh(new THREE.SphereGeometry(6, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffff}));
      bolaLuz.position.set(60, 6, 30);
      scene.add(bolaLuz);
    });

    // 4. ÁRBOLES GEOMÉTRICOS (Pega el código de antes)
    function crearArbol(x, z) {
      const troncoGeo = new THREE.CylinderGeometry(1.5, 2, 12, 6);
      const troncoMat = new THREE.MeshStandardMaterial({ color: 0x2d1a11, roughness: 1 });
      const tronco = new THREE.Mesh(troncoGeo, troncoMat);
      tronco.position.set(x, 6, z);
      scene.add(tronco);

      const hojasGeo = new THREE.ConeGeometry(8, 25, 5); 
      const hojasMat = new THREE.MeshStandardMaterial({ color: 0x0a290a, roughness: 0.9 });
      const hojas = new THREE.Mesh(hojasGeo, hojasMat);
      hojas.position.set(x, 22, z); 
      scene.add(hojas);
    }
    for (let i = 0; i < 70; i++) {
      const angulo = Math.random() * Math.PI * 2;
      const radio = 80 + Math.random() * 200; 
      const arbolX = Math.cos(angulo) * radio;
      const arbolZ = Math.sin(angulo) * radio;
      crearArbol(arbolX, arbolZ);
    }

    // 5. LUCIÉRNAGAS 3D Y FUEGOS ARTIFICIALES
    initParticulasSistemas();

    // 6. LUNA BRILLANTE (Fija en el cielo)
    const lunaGeo = new THREE.SphereGeometry(25, 32, 32);
    const lunaMat = new THREE.MeshBasicMaterial({ color: 0xffffcc }); 
    const luna = new THREE.Mesh(lunaGeo, lunaMat);
    luna.position.set(-300, 250, -200); // Esquina alta
    scene.add(luna);
    const lunaLight = new THREE.PointLight(0xffffcc, 3, 800);
    luna.add(lunaLight);

    animate3D();

    // Interaction Setup
    raycaster = new THREE.Raycaster();
    renderer.domElement.addEventListener('click', onLagoClick);
    window.addEventListener('resize', on3DWindowResize);
  }

  function onLagoClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(lakeMesh);
    if (intersects.length > 0) {
      onInteraccionFinal();
    }
  }
  function on3DWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  function animate3D() {
    requestAnimationFrame(animate3D);
    controls.update();
    actualizarParticulas3D(); // Actualizar Luciérnagas y Fuegos artificiales
    renderer.render(scene, camera);
  }


  // ==========================================
  // SITEMA DE FUEGOS ARTIFICIALES Y LUCIÉRNAGAS 3D
  // ==========================================
  let fireflies3DSystem, fireworksSystems = [];
  let textureParticle;

  function initParticulasSistemas() {
    // 1. Textura de Partícula (Fallback si no hay `particle.png`)
    const loader = new THREE.TextureLoader();
    textureParticle = loader.load('src_bosque/particle.png', (txt) => {
      txt.needsUpdate = true;
    }, undefined, () => {
      // Fallback Canvas Texture si falla el archivo
      const canvas = document.createElement('canvas'); canvas.width = 32; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.beginPath(); ctx.arc(16, 16, 14, 0, Math.PI*2); 
      ctx.fillStyle = 'white'; ctx.shadowBlur=10; ctx.shadowColor='white'; ctx.fill();
      textureParticle = new THREE.CanvasTexture(canvas);
    });

    // 2. LUCIÉRNAGAS 3D Estáticas (Las de siempre)
    const particlesGeo = new THREE.BufferGeometry();
    const particlesPos = [];
    for (let i = 0; i < 350; i++) {
      particlesPos.push((Math.random() - 0.5) * 450, Math.random() * 120, (Math.random() - 0.5) * 450);
    }
    particlesGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlesPos, 3));
    const particlesMat = new THREE.PointsMaterial({ color: 0xadff2f, size: 2.5, transparent: true, opacity: 0.8 });
    fireflies3DSystem = new THREE.Points(particlesGeo, particlesMat);
    scene.add(fireflies3DSystem);
  }

  // LanzarFuegod artificiales (Crear sistema de partículas dinámico)
  function onInteraccionFinal() {
    // 1. Lanzar Fuegos Artificiales
    lanzarFuegoArtificial(0, 0); // Uno central
    setTimeout(() => lanzarFuegoArtificial(50, 20), 200); // Uno a la derecha
    setTimeout(() => lanzarFuegoArtificial(-50, -20), 400); // Uno a la izquierda

    // 2. Iniciar Secuencia de Cartas Finales
    mostrarCartaFinalText();
  }

  function lanzarFuegoArtificial(startX, startZ) {
    const geo = new THREE.BufferGeometry();
    const pos = []; const vel = []; const colors = [];
    const numParticulas = 200;
    const baseColor = new THREE.Color(`hsl(${Math.random() * 60 + 40}, 100%, 70%)`); // Amarillo/Naranja brillante

    for (let i = 0; i < numParticulas; i++) {
      // Posición inicial (centro del lago spread)
      pos.push(startX + (Math.random()-0.5)*10, Math.random() * 5, startZ + (Math.random()-0.5)*10);
      
      // Velocidad (explosión esférica)
      const anguloH = Math.random() * Math.PI * 2;
      const anguloV = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 1.5;
      vel.push(Math.cos(anguloH) * speed, 3 + Math.random()*2, Math.sin(anguloH) * speed); // Sube rápido
      
      // Color
      colors.push(baseColor.r, baseColor.g, baseColor.b);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute('velocity', new THREE.Float32BufferAttribute(vel, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({ 
      size: 5, map: textureParticle, transparent: true, blending: THREE.AdditiveBlending, vertexColors: true, depthWrite: false 
    });
    const fw = new THREE.Points(geo, mat);
    fw.userData = { life: 1, timer: 0, exploded: false, vY: 3 };
    fireworksSystems.push(fw);
    scene.add(fw);
  }

  function actualizarParticulas3D() {
    // Giran Luciérnagas 3D
    if (fireflies3DSystem) fireflies3DSystem.rotation.y += 0.0008;

    // Actualizar Fuegos Artificiales
    const time = Date.now();
    for (let i = fireworksSystems.length - 1; i >= 0; i--) {
      const fw = fireworksSystems[i];
      const positions = fw.geometry.getAttribute('position').array;
      const velocities = fw.geometry.getAttribute('velocity').array;
      fw.userData.timer += 0.01;

      for (let j = 0; j < 200; j++) {
        // Movimiento de partículas
        positions[j*3] += velocities[j*3] * 0.2; 
        positions[j*3+1] += velocities[j*3+1] * 0.2; 
        positions[j*3+2] += velocities[j*3+2] * 0.2; 

        if (fw.userData.exploded) {
           velocities[j*3] *= 0.98; velocities[j*3+1] *= 0.98; velocities[j*3+2] *= 0.98; // Freno explosión
           velocities[j*3+1] -= 0.03; // Gravedad
        } else {
           velocities[j*3+1] *= 0.99; // Freno subida
        }
      }
      fw.geometry.getAttribute('position').needsUpdate = true;

      // Lógica de explosión/desvanecimiento
      if (fw.userData.timer > 1.2 && !fw.userData.exploded) {
         // Explode! (Simula expandirse más rápido)
         fw.userData.exploded = true;
         for (let j = 0; j < 200; j++) {
           velocities[j*3] *= 2.5; velocities[j*3+1] *= 1.5; velocities[j*3+2] *= 2.5;
         }
      }

      if (fw.userData.timer > 1.5) {
         fw.userData.life -= 0.02; // Desvanecer
         fw.material.opacity = fw.userData.life;
      }

      if (fw.userData.life <= 0) {
        scene.remove(fw); fw.geometry.dispose(); fw.material.dispose();
        fireworksSystems.splice(i, 1);
      }
    }
  }


  // ==========================================
  // SECUENCIA FINAL DE CARTAS (TEXTO -> CÓDIGO GIRASOL -> TIMER 5s)
  // ==========================================
  const modalCartaFinalText = document.getElementById('modalCartaFinal');
  const btnCerrarFinal = document.getElementById('btnCerrarCartaFinal');
  const modalFlorAmarilla = document.getElementById('modalFlorAmarilla');

  function mostrarCartaFinalText() {
    // 1. Mostrar la carta final con texto verbatim
    modalCartaFinalText.style.display = 'flex';
  }

  // Al cerrar la carta final, empieza la secuencia de la flor de código
  btnCerrarFinal.addEventListener('click', () => {
    modalCartaFinalText.style.display = 'none';
    iniciarSecuenciaFlorAmarilla();
  });

  function iniciarSecuenciaFlorAmarilla() {
    // 1. Generar el girasol MÁGICO con código Canvas
    const size = 300; // Tamaño del canvas generado
    const flowerCanvas = createSunflowerCanvasElement(size);

    // 2. Inyectarlo en el modal HTML
    const container = document.getElementById('flowerCanvasContainer');
    // Limpiar contenido previo y agregar el nuevo canvas
    container.innerHTML = '';
    // Aplicar estilos para que se vea igual que una imagen
    flowerCanvas.style.maxWidth = '200px'; 
    flowerCanvas.style.height = 'auto';
    container.appendChild(flowerCanvas);

    // 3. Mostrar el modal de la flor amarilla (verbatim text y girasol de código)
    modalFlorAmarilla.style.display = 'flex';
    modalFlorAmarilla.style.opacity = '1';

    // 4. Programar que desaparezca a los 5 segundos exactos (5000 milisegundos)
    setTimeout(() => {
      // Iniciamos desvanecimiento suave (duración 1s según CSS)
      modalFlorAmarilla.style.opacity = '0';
      
      // A los 6 segundos (5s de espera + 1s de fade), lo ocultamos del todo
      setTimeout(() => {
        modalFlorAmarilla.style.display = 'none';
      }, 1000);
    }, 5000);
  }

  // ==========================================
  // FUNCIÓN MATEMÁTICA: GENERAR UN GIRASOL CANVAS
  // ==========================================
  function createSunflowerCanvasElement(size) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = size;
    canvas.height = size;
    const center = size / 2;

    // Resetear y centrar el origen
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.translate(center, center);

    // DIBUJAR PÉTALOS (2 capas de amarillo neón)
    const numPetals = 20;
    const petalColor1 = '#FFC300'; // Amarillo vibrante neón
    const petalColor2 = '#FFD700'; // Amarillo dorado neón

    for (let layer = 1; layer >= 0; layer--) {
      const currentPetalColor = layer === 1 ? petalColor1 : petalColor2;
      // Parámetros de pétalo más pequeños para la capa interna
      const petalLength = center * 0.9 * (layer === 1 ? 1 : 0.85);
      const petalWidth = center * 0.2 * (layer === 1 ? 1 : 0.9);
      const angleIncrement = (2 * Math.PI) / (numPetals * (layer === 1 ? 1 : 1.1));

      for (let i = 0; i < (numPetals * (layer === 1 ? 1 : 1.1)); i++) {
        // Rotación de pétalo individual (con ligero desfase para la capa 2)
        const angle = i * angleIncrement + (layer === 1 ? 0 : angleIncrement / 2);
        ctx.save();
        ctx.rotate(angle);
        
        // Dibujar pétalo como forma elíptica/puntiaguda con Bezier curves
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-petalWidth / 2, petalLength / 2, 0, petalLength);
        ctx.quadraticCurveTo(petalWidth / 2, petalLength / 2, 0, 0);
        ctx.closePath();
        
        ctx.fillStyle = currentPetalColor;
        ctx.shadowBlur = 10;
        ctx.shadowColor = `rgba(${currentPetalColor === '#FFC300' ? '255,195,0' : '255,215,0'}, 1)`;
        ctx.fill();
        ctx.restore();
      }
    }

    // DIBUJAR CENTRO (Círculo marrón detallado con puntitos de semillas)
    const centerRadius = center * 0.35;
    ctx.beginPath();
    ctx.arc(0, 0, centerRadius, 0, 2 * Math.PI);
    ctx.fillStyle = '#654321'; // Marrón oscuro
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'rgba(101,67,33, 0.5)';
    ctx.fill();

    // Puntitos de Semillas (Disposición en espiral con ángulo de oro)
    const numSeeds = 150;
    const seedColor = '#3e2a14'; // Marrón más oscuro neón
    const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // Ángulo de oro (~137.5 grados)

    for (let i = 0; i < numSeeds; i++) {
      // Radio aumenta con la raíz cuadrada del índice para llenar el espacio uniformemente
      const radius = Math.sqrt(i) * (centerRadius / Math.sqrt(numSeeds));
      const theta = i * goldenAngle;
      const x = Math.cos(theta) * radius;
      const y = Math.sin(theta) * radius;
      
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, 2 * Math.PI); // Puntito de semilla
      ctx.fillStyle = seedColor;
      ctx.fill();
    }

    // Resetear origen antes de devolver
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    return canvas;
  }

</script>
