<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viaje al Centro de Nuestro Hilo 🧵✨</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  
  #contenedorMedia {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10; pointer-events: none;
    perspective: 1200px;
  }

  .recuerdo-3d {
    position: absolute;
    border: 2px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
    border-radius: 12px;
    object-fit: cover;
    transform-origin: center;
    display: none;
    background: #111;
  }

  #controles {
    position: fixed; bottom: 40px; width: 100%; text-align: center;
    z-index: 100; display: none;
  }
  
  .btn {
    padding: 14px 28px; background: rgba(0, 0, 0, 0.8); color: white;
    border: 2px solid #ff0000; border-radius: 50px; cursor: pointer; 
    text-decoration: none; font-weight: bold; margin: 0 10px;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); transition: 0.3s;
  }
  .btn:hover { background: #ff0000; transform: scale(1.1); }

  #musicStatus {
    position: fixed; top: 20px; left: 20px; z-index: 100;
    color: rgba(255, 255, 255, 0.5); font-size: 0.7rem;
    letter-spacing: 1px; text-transform: uppercase;
  }
</style>
</head>
<body>

<audio id="musicaRojo" loop>
  <source src="videos/musicarojo.mp3" type="audio/mpeg">
</audio>

<div id="musicStatus">MUEVE EL CURSOR PARA GUIAR EL DESTINO 🎵</div>

<canvas id="canvasMundo"></canvas>
<div id="contenedorMedia"></div>

<div id="controles">
  <a href="hilo_rojo.html" class="btn">🧵 Volver</a>
  <a href="index.html" class="btn" style="border-color: #555;">🏠 Inicio</a>
</div>

<script>
const canvas = document.getElementById('canvasMundo');
const ctx = canvas.getContext('2d');
const contenedor = document.getElementById('contenedorMedia');
const audio = document.getElementById('musicaRojo');
const statusTxt = document.getElementById('musicStatus');

const misRecuerdosOriginales = [];
for (let i = 1; i <= 40; i++) { misRecuerdosOriginales.push({ type: 'img', src: `fotos/foto${i}.jpg` }); }
for (let j = 1; j <= 10; j++) { misRecuerdosOriginales.push({ type: 'video', src: `videos/video${j}.mp4` }); }

let recuerdosDisponibles = [...misRecuerdosOriginales];
let width, height;
// Posiciones para el seguimiento del cursor
let centerX, centerY;
let targetX, targetY;
let stars = [];
let mediaObjects = [];
let frame = 0;

function init() {
  width = window.innerWidth;
  height = window.innerHeight;
  // Inicializamos el centro en la mitad de la pantalla
  centerX = width / 2;
  centerY = height / 2;
  targetX = centerX;
  targetY = centerY;
  
  canvas.width = width;
  canvas.height = height;

  stars = [];
  for(let i=0; i<300; i++) {
    stars.push({ x: Math.random()*width*3 - width*1.5, y: Math.random()*height*3 - height*1.5, z: Math.random()*2000 });
  }
  shuffle(recuerdosDisponibles);
}

// Seguimiento del ratón o toque
window.addEventListener('mousemove', (e) => {
    targetX = e.clientX;
    targetY = e.clientY;
});

window.addEventListener('touchmove', (e) => {
    targetX = e.touches[0].clientX;
    targetY = e.touches[0].clientY;
});

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

window.addEventListener('click', () => {
    if (audio.paused) {
        audio.play().then(() => {
            statusTxt.innerText = "GUIANDO EL DESTINO 🎶";
            statusTxt.style.color = "#ff4444";
        });
    }
});

function spawnMedia() {
  if (recuerdosDisponibles.length === 0) {
    recuerdosDisponibles = [...misRecuerdosOriginales];
    shuffle(recuerdosDisponibles);
  }

  const data = recuerdosDisponibles.pop();
  const el = document.createElement(data.type === 'img' ? 'img' : 'video');
  el.src = data.src;
  el.className = 'recuerdo-3d';
  
  if(data.type === 'video') { 
      el.autoplay = true; el.muted = true; el.loop = true; el.playsInline = true; 
      el.onerror = () => { el.remove(); spawnMedia(); };
  } else {
      el.onerror = () => { el.remove(); spawnMedia(); };
  }
  
  contenedor.appendChild(el);
  
  mediaObjects.push({
    element: el,
    x: (Math.random() - 0.5) * 1800,
    y: (Math.random() - 0.5) * 1200,
    z: 2000, 
    w: 240, 
    h: 180 
  });
}

function update() {
  // Suavizado del movimiento del centro (Ease-out)
  centerX += (targetX - centerX) * 0.05;
  centerY += (targetY - centerY) * 0.05;

  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, width, height);

  // ESTRELLAS
  ctx.fillStyle = "white";
  stars.forEach(s => {
    s.z -= 15;
    if(s.z <= 0) s.z = 2000;
    let f = 400 / s.z;
    let sx = s.x * f + centerX;
    let sy = s.y * f + centerY;
    ctx.globalAlpha = Math.max(0, 1 - (s.z / 2000));
    ctx.fillRect(sx, sy, f*2.5, f*2.5);
  });

  // EL HILO SIGUE EL CURSOR
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 4;
  ctx.shadowBlur = 25;
  ctx.shadowColor = 'red';
  ctx.beginPath();
  
  for(let i=10; i<2000; i+=40) {
    let f = 400 / i;
    // La "wave" se suma a la posición del centro
    let waveX = Math.sin(Date.now() * 0.003 + i * 0.008) * 80;
    let waveY = Math.cos(Date.now() * 0.002 + i * 0.012) * 50;
    let hx = waveX * f + centerX;
    let hy = waveY * f + centerY;
    if(i === 10) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // RECUERDOS SIGUEN EL CURSOR
  mediaObjects.forEach((m, index) => {
    m.z -= 12; 
    
    if(m.z <= 0) {
      m.element.remove();
      mediaObjects.splice(index, 1);
    } else {
      let f = 400 / m.z;
      let sx = m.x * f + centerX;
      let sy = m.y * f + centerY;
      let sw = m.w * f;
      let sh = m.h * f;

      m.element.style.display = 'block';
      m.element.style.left = (sx - sw/2) + 'px';
      m.element.style.top = (sy - sh/2) + 'px';
      m.element.style.width = sw + 'px';
      m.element.style.height = sh + 'px';
      
      let op = 1 - (m.z / 2000); 
      if (m.z < 150) op = m.z / 150;
      m.element.style.opacity = Math.max(0, op);
      m.element.style.zIndex = Math.floor(2000 - m.z);
    }
  });

  if(frame % 70 === 0) spawnMedia();
  if(frame === 350) document.getElementById('controles').style.display = 'block';

  frame++;
  requestAnimationFrame(update);
}

window.addEventListener('resize', init);
init();
update();
</script>
</body>
</html>
