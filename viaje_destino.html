<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viaje al Centro de Nuestro Hilo 🧵✨</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  
  /* Contenedor de fotos/videos */
  #contenedorMedia {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10; pointer-events: none;
  }

  .recuerdo-3d {
    position: absolute;
    border: 2px solid rgba(255, 0, 0, 0.5);
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
    border-radius: 10px;
    object-fit: cover;
    transform-origin: center;
    /* Se ocultan al inicio */
    display: none;
  }

  #controles {
    position: fixed; bottom: 30px; width: 100%; text-align: center;
    z-index: 100; display: none;
  }
  .btn {
    padding: 12px 25px; background: rgba(255,0,0,0.8); color: white;
    border: none; border-radius: 50px; cursor: pointer; text-decoration: none;
    font-weight: bold; margin: 0 10px; box-shadow: 0 0 15px red;
  }
</style>
</head>
<body>

<canvas id="canvasMundo"></canvas>
<div id="contenedorMedia"></div>

<div id="controles">
  <a href="hilo_rojo.html" class="btn">🧵 Volver</a>
  <a href="index.html" class="btn" style="background:#444; box-shadow:none;">🏠 Inicio</a>
</div>

<script>
const canvas = document.getElementById('canvasMundo');
const ctx = canvas.getContext('2d');
const contenedor = document.getElementById('contenedorMedia');

// --- TUS RECUERDOS (Pon aquí tus rutas reales) ---
const misRecuerdos = [
  { type: 'img', src: 'fotos/foto1.jpg' },
  { type: 'img', src: 'fotos/foto2.jpg' },
  { type: 'video', src: 'videos/video1.mp4' }
];

let width, height, centerX, centerY;
let stars = [];
let mediaObjects = [];
const speed = 0.02; // Velocidad del viaje

function init() {
  width = window.innerWidth;
  height = window.innerHeight;
  centerX = width / 2;
  centerY = height / 2;
  canvas.width = width;
  canvas.height = height;

  // Generar Estrellas Iniciales
  stars = [];
  for(let i=0; i<200; i++) {
    stars.push({ x: Math.random()*width - centerX, y: Math.random()*height - centerY, z: Math.random()*1000 });
  }
}

// Crear una foto/video en el espacio 3D
function spawnMedia() {
  const data = misRecuerdos[Math.floor(Math.random() * misRecuerdos.length)];
  const el = document.createElement(data.type === 'img' ? 'img' : 'video');
  el.src = data.src;
  el.className = 'recuerdo-3d';
  if(data.type === 'video') { el.autoplay = true; el.muted = true; el.loop = true; }
  
  contenedor.appendChild(el);
  
  mediaObjects.push({
    element: el,
    x: (Math.random() - 0.5) * 800, // Dispersión lateral
    y: (Math.random() - 0.5) * 600, // Dispersión vertical
    z: 1000, // Aparecen al fondo
    w: 200, // Ancho base
    h: 150  // Alto base
  });
}

function update() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, width, height);

  // 1. DIBUJAR ESTRELLAS
  ctx.fillStyle = "white";
  stars.forEach(s => {
    s.z -= 10;
    if(s.z <= 0) s.z = 1000;
    
    let f = 400 / s.z;
    let sx = s.x * f + centerX;
    let sy = s.y * f + centerY;
    let size = f * 2;
    
    ctx.globalAlpha = 1 - (s.z / 1000);
    ctx.fillRect(sx, sy, size, size);
  });

  // 2. DIBUJAR HILO ROJO EN TÚNEL
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 4;
  ctx.shadowBlur = 15;
  ctx.shadowColor = 'red';
  ctx.beginPath();
  
  for(let i=0; i<1000; i+=50) {
    let f = 400 / i;
    let curve = Math.sin(Date.now() * 0.002 + i * 0.005) * 50;
    let hx = curve * f + centerX;
    let hy = (Math.cos(i*0.01)*30) * f + centerY;
    
    if(i === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 3. ACTUALIZAR FOTOS/VIDEOS
  mediaObjects.forEach((m, index) => {
    m.z -= 8; // Velocidad de acercamiento
    
    if(m.z <= 0) {
      m.element.remove();
      mediaObjects.splice(index, 1);
    } else {
      let f = 400 / m.z;
      let sx = m.x * f + centerX;
      let sy = m.y * f + centerY;
      let sw = m.w * f;
      let sh = m.h * f;

      m.element.style.display = 'block';
      m.element.style.left = (sx - sw/2) + 'px';
      m.element.style.top = (sy - sh/2) + 'px';
      m.element.style.width = sw + 'px';
      m.element.style.height = sh + 'px';
      m.element.style.opacity = 1 - (m.z / 1000);
      m.element.style.zIndex = Math.floor(1000 - m.z);
    }
  });

  if(Math.random() < 0.02) spawnMedia();
  if(mediaObjects.length > 0) document.getElementById('controles').style.display = 'block';

  requestAnimationFrame(update);
}

window.addEventListener('resize', init);
init();
update();
</script>
</body>
</html>
