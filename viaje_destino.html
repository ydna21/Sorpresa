<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Viaje de Nuestro Hilo 🧵✨</title>
<style>
  body { margin: 0; background: #010105; overflow: hidden; font-family: 'Courier New', monospace; }
  
  /* El canvas del hilo y estrellas siempre al frente de las fotos */
  #canvasViaje { position: fixed; top: 0; left: 0; z-index: 5; pointer-events: none; }
  
  #contenedorRecuerdos {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 2; pointer-events: none;
    perspective: 1000px; /* Añade profundidad 3D */
  }

  .memoria {
    position: absolute;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
    border-radius: 6px;
    opacity: 0;
    /* Empezamos muy pequeños y lejos */
    transform: translate(-50%, -50%) scale(0.1) translateZ(-500px);
    transition: transform 6s linear, opacity 1.5s;
    object-fit: cover;
    
    /* MODIFICACIÓN: Límite estricto de tamaño */
    max-width: 150px; 
    max-height: 150px;
  }

  #controles {
    position: fixed; bottom: 30px; width: 100%; text-align: center;
    z-index: 10; display: none; animation: fadeIn 2s forwards;
  }

  .btn-final {
    padding: 10px 20px; background: rgba(0,0,0,0.8); color: white;
    border: 2px solid #ff0000; border-radius: 50px; cursor: pointer;
    text-decoration: none; font-weight: bold; margin: 0 10px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<canvas id="canvasViaje"></canvas>
<div id="contenedorRecuerdos"></div>

<div id="controles">
  <a href="hilo_rojo.html" class="btn-final">🧵 Volver</a>
  <a href="index.html" class="btn-final" style="border-color: #444;">🏠 Inicio</a>
</div>

<script>
const canvas = document.getElementById('canvasViaje');
const ctx = canvas.getContext('2d', { alpha: false }); // Optimización
const contenedor = document.getElementById('contenedorRecuerdos');

// --- TUS RECUERDOS ---
const misRecuerdos = [
  { type: 'img', src: 'fotos/foto1.jpg' },
  { type: 'img', src: 'fotos/foto2.jpg' },
  { type: 'img', src: 'fotos/foto3.jpg' },
  { type: 'img', src: 'fotos/foto4.jpg' },
  { type: 'img', src: 'fotos/foto5.jpg' } // Añadí más para variedad
];

let width, height;
let stars = [];
let frame = 0;

function init() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  stars = [];
  for(let i=0; i<120; i++) { // Menos estrellas para no saturar
    stars.push({ x: Math.random()*width, y: Math.random()*height, z: Math.random()*width });
  }
}

function spawnMemoria() {
  if (misRecuerdos.length === 0) return;
  const data = misRecuerdos[Math.floor(Math.random() * misRecuerdos.length)];
  const el = document.createElement(data.type === 'img' ? 'img' : 'video');
  el.src = data.src;
  el.className = 'memoria';
  
  // Aparecen lejos del centro para no tapar el hilo principal
  const side = Math.random() > 0.5 ? 1 : -1;
  el.style.left = (50 + (side * (25 + Math.random() * 20))) + '%';
  el.style.top = (Math.random() * 60 + 20) + '%';

  contenedor.appendChild(el);

  setTimeout(() => {
    // MODIFICACIÓN: Más transparencia y escala menor
    el.style.opacity = '0.5'; 
    el.style.transform = `translate(-50%, -50%) scale(0.8) rotate(${Math.random()*10-5}deg) translateZ(0)`;
  }, 100);

  setTimeout(() => { el.style.opacity = '0'; }, 4800);
  setTimeout(() => { el.remove(); }, 6500);
}

function drawHilo(t) {
  ctx.save();
  const pulse = Math.sin(t * 0.005) * 5;
  
  ctx.beginPath();
  ctx.moveTo(-50, height / 2);
  
  // Curva elegante central
  ctx.bezierCurveTo(
    width * 0.4, height * 0.1 + pulse,
    width * 0.6, height * 0.9 - pulse,
    width + 50, height / 2
  );

  // Brillo exterior (Glow)
  ctx.strokeStyle = 'rgba(255, 0, 0, 0.4)';
  ctx.lineWidth = 15 + Math.abs(pulse); // Más ancho el glow
  ctx.stroke();

  // Hilo principal
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 5;
  ctx.stroke();
  
  // Núcleo brillante
  ctx.strokeStyle = '#ffaabb';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  ctx.restore();
}

function drawStars() {
  ctx.fillStyle = 'white';
  stars.forEach(s => {
    s.z -= 3; // Un poco más lento el warp
    if(s.z <= 0) s.z = width;
    const sx = (s.x - width/2) * (width/s.z) + width/2;
    const sy = (s.y - height/2) * (width/s.z) + height/2;
    const size = (1 - s.z/width) * 2;
    ctx.globalAlpha = 1 - s.z/width;
    ctx.fillRect(sx, sy, size, size); // fillRect es más rápido que arc
  });
  ctx.globalAlpha = 1;
}

function loop(t) {
  // Fondo con rastro para efecto de velocidad
  ctx.fillStyle = 'rgba(1, 1, 5, 0.2)';
  ctx.fillRect(0, 0, width, height);

  drawStars();
  drawHilo(t);

  if(frame % 180 === 0) spawnMemoria(); // Un poco más lento el spawn
  
  if(frame === 360) document.getElementById('controles').style.display = 'block';

  frame++;
  requestAnimationFrame(loop);
}

window.addEventListener('resize', init);
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
