<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Universo para Ti 💖</title>
<style>
  body { margin: 0; background: black; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  
  /* --- PANTALLA DE ENTRADA --- */
  #pantallaEntrada {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: black; z-index: 999; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #ff69b4;
    transition: opacity 1s ease;
  }
  #pantallaEntrada h2 { font-size: 2rem; text-shadow: 0 0 15px #ff69b4; text-align: center; padding: 0 20px;}
  
  #btnEmpezarUniverso {
    margin-top: 30px; padding: 15px 40px; font-size: 1.5rem; background: #ff1493;
    color: white; border: none; border-radius: 50px; 
    box-shadow: 0 0 25px #ff1493;
    opacity: 0.5; cursor: not-allowed; pointer-events: none; 
    transition: all 0.5s ease;
  }
  
  #btnEmpezarUniverso.listo {
    opacity: 1; cursor: pointer; pointer-events: auto; 
    animation: latidoEntrada 1.5s infinite;
  }

  @keyframes latidoEntrada {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* --- CARTEL DE MENSAJES OCULTOS (Solo PC) --- */
  #mensajePlaneta {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(20, 0, 10, 0.85); border: 2px solid #ff1493; color: white;
    padding: 20px 40px; border-radius: 20px; font-size: 1.8rem; text-align: center;
    z-index: 1000; box-shadow: 0 0 40px #ff1493; animation: aparecerMensaje 0.5s ease;
    pointer-events: none; text-shadow: 0 0 10px #ffb6c1;
  }
  @keyframes aparecerMensaje { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }

  /* --- RESTO DEL UNIVERSO --- */
  #threeCanvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
  
  #mainContent {
    position: absolute; bottom: 60px; left: 0; width: 100%;
    z-index: 2; display: flex; flex-direction: column;
    align-items: center; text-align: center; pointer-events: none;
    opacity: 0; transition: opacity 2s ease;
  }
  
  h1 { font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff1493; margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate; margin-top: 0; }
  p { font-size: 1.5rem; color: #ffb6c1; max-width: 600px; margin-top: 0; margin-bottom: 0; }
  
  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff69b4; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ffb6c1, 0 0 40px #ff1493; }
  }

  @keyframes latidoPastel {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .btn-regresar {
    margin-top: 25px; padding: 15px 30px; font-size: 1.2rem; background: transparent;
    border: 2px solid #ff69b4; color: #ff69b4; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.5); pointer-events: auto; transition: all 0.3s;
  }
  .btn-regresar:hover { background: #ff69b4; color: white; box-shadow: 0 0 30px #ff69b4; }
</style>
</head>
<body>

<audio id="musica2" loop crossorigin="anonymous">
  <source src="musica2.mp3" type="audio/mpeg">
</audio>

<div id="pantallaEntrada">
  <h2>✨ Preparando el viaje espacial... ✨</h2>
  <button id="btnEmpezarUniverso">Cargando motores... (4s)</button>
</div>

<div id="mensajePlaneta"></div>

<div id="threeCanvas"></div>

<div id="mainContent">
  <h1 id="tituloCumple">¡Feliz Cumpleaños! <span id="pastelBtn" style="cursor:pointer; pointer-events:auto;" title="Toca para regresar">🎂</span>💖</h1>
  <p id="parrafoCumple">Eres el sol que ilumina mi universo. Que este nuevo año cumplas muchas cosas y sigamos siempre juntos❤️</p>
  <button id="btnVolver" class="btn-regresar" onclick="window.location.href='index.html'">⬅️ Regresar al inicio</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// --- LEER LA ELECCIÓN DEL USUARIO ---
const eleccion = localStorage.getItem('dispositivoElegido');
const esCelular = (eleccion === 'celular') || (window.innerWidth < 768 && eleccion !== 'pc');

// --- LÓGICA DEL BOTÓN DE 4 SEGUNDOS ---
let contadorCarga = 4;
const btnEmpezar = document.getElementById('btnEmpezarUniverso');
const intervaloCarga = setInterval(() => {
    contadorCarga--;
    if (contadorCarga > 0) {
        btnEmpezar.innerText = `Cargando motores... (${contadorCarga}s)`;
    } else {
        clearInterval(intervaloCarga);
        btnEmpezar.innerText = "🚀 Entrar al Universo";
        btnEmpezar.classList.add("listo"); 
        document.querySelector('#pantallaEntrada h2').innerText = "✨ El universo está listo ✨";
    }
}, 1000);

// --- ESTADO DE VIAJE ESPACIAL ---
let enViaje = false;
let viajeProgress = 0;
const viajeDuration = 3000;

// --- VARIABLES GLOBALES DE AUDIO Y EFECTOS ---
let audioContext, analyser, dataArray;
let composer, bloomPass;

document.getElementById('btnEmpezarUniverso').addEventListener('click', function() {
    // 1. Iniciar Audio y Reactividad
    const audio = document.getElementById('musica2');
    if (!esCelular) {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(audio);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioContext.state === 'suspended') audioContext.resume();
    }
    audio.play();

    // 2. Iniciar Viaje
    enViaje = true;
    controls.enabled = false;
    
    const pantalla = document.getElementById('pantallaEntrada');
    pantalla.style.opacity = '0';
    
    setTimeout(() => {
        pantalla.style.display = 'none';
        document.getElementById('mainContent').style.opacity = '1';
        controls.enabled = true;
        enViaje = false;
        if (!esCelular) { camera.fov = 75; camera.updateProjectionMatrix(); }
    }, viajeDuration + 500); 
});

document.getElementById('pastelBtn').addEventListener('click', () => window.location.href = 'index.html');

// --- ADAPTACIÓN A CELULAR ---
if (esCelular) {
    const titulo = document.getElementById('tituloCumple');
    const parrafo = document.getElementById('parrafoCumple');
    const boton = document.getElementById('btnVolver');
    const contenedor = document.getElementById('mainContent');
    const pastel = document.getElementById('pastelBtn');
    
    titulo.style.fontSize = "1.8rem";      
    titulo.style.marginBottom = "5px";
    parrafo.style.fontSize = "1.1rem";     
    parrafo.style.maxWidth = "90%";
    parrafo.style.padding = "0 15px";
    boton.style.display = "none"; 
    pastel.style.display = "inline-block";
    pastel.style.animation = "latidoPastel 1.5s infinite";
    contenedor.style.bottom = "50px"; 
} else {
    document.getElementById('pastelBtn').style.display = "none";
}

// --- VARIABLES GLOBALES 3D ---
let scene, camera, renderer, controls, sun;
let width, height, starfield, systemRotationGroup;
let detailedPlanets = []; 
let photoStars = []; 
let activeExplosions = []; 
const textureLoader = new THREE.TextureLoader();
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let mouseXParallax = 0, mouseYParallax = 0, targetCameraX = 0, targetCameraY = 300;

// MENSAJES OCULTOS PARA LOS PLANETAS
const frasesPlanetas = [
    "Eres mi estrella favorita ✨",
    "Contigo hasta el infinito 🚀",
    "Mi mundo gira por ti 🌍",
    "Te amo de aquí a la luna 🌙",
    "Juntos somos magia 💖",
    "Mi lugar favorito es contigo 🥰",
    "Gracias por existir ✨",
    "Eres mi universo entero 🌌"
];

function init() {
  width = window.innerWidth;
  height = window.innerHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.FogExp2(0x000000, 0.0001); 

  camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 30000);
  camera.position.set(0, 1000, 5000); 

  renderer = new THREE.WebGLRenderer({ antialias: !esCelular }); 
  renderer.setSize(width, height);
  renderer.setPixelRatio(esCelular ? 1 : Math.min(window.devicePixelRatio, 2)); 
  document.getElementById('threeCanvas').appendChild(renderer.domElement);

  // --- EFECTO BLOOM REDUCIDO Y CALIBRADO ---
  if (!esCelular) {
      const renderScene = new THREE.RenderPass(scene, camera);
      bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
      
      // AJUSTES APLICADOS AQUÍ PARA EVITAR QUE TODO SE VEA BORROSO
      bloomPass.threshold = 0.3;  // Solo los objetos muy brillantes tendrán el halo
      bloomPass.strength = 0.6;   // Resplandor mucho más suave
      bloomPass.radius = 0.5;     // Halo menos expansivo

      composer = new THREE.EffectComposer(renderer);
      composer.addPass(renderScene);
      composer.addPass(bloomPass);
  }

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.05;
  controls.minDistance = 150; controls.maxDistance = 12000;

  systemRotationGroup = new THREE.Group();
  scene.add(systemRotationGroup);

  const sunGeometry = new THREE.SphereGeometry(60, 32, 32);
  const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdf00 }); 
  sun = new THREE.Mesh(sunGeometry, sunMaterial);
  systemRotationGroup.add(sun); 
  
  const sunLight = new THREE.PointLight(0xff69b4, 4, 3000); 
  sun.add(sunLight);
  const ambientLight = new THREE.AmbientLight(0x404040, 1.2); 
  scene.add(ambientLight);

  // PLANETAS CON LUNAS Y MENSAJES
  createDetailedPlanet(10, 0xffb6c1, 150, 0.015, false, false, frasesPlanetas[0]);
  createDetailedPlanet(15, 0xdda0dd, 200, 0.012, false, false, frasesPlanetas[1]);
  createDetailedPlanet(18, 0x87cefa, 260, 0.010, false, true,  frasesPlanetas[2]); 
  createDetailedPlanet(12, 0xffdab9, 310, 0.009, false, false, frasesPlanetas[3]);
  createDetailedPlanet(50, 0x98fb98, 500, 0.006, true,  true,  frasesPlanetas[4]); 
  createDetailedPlanet(40, 0xd8bfd8, 650, 0.005, false, false, frasesPlanetas[5]);
  createDetailedPlanet(30, 0xafeeee, 800, 0.004, false, false, frasesPlanetas[6]);
  createDetailedPlanet(28, 0xb0c4de, 950, 0.0035,false, false, frasesPlanetas[7]);

  createStarfield();
  createRealisticLocalizedFog();
  loadPhotoStars();

  const canvasElement = document.getElementById('threeCanvas');
  canvasElement.addEventListener('click', onWorldClick); 
  canvasElement.addEventListener('touchstart', onWorldTouch, { passive: false });
  window.addEventListener('mousemove', onMouseMove);
}

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    if (!esCelular) {
        mouseXParallax = (event.clientX - window.innerWidth / 2) * 2; 
        mouseYParallax = (event.clientY - window.innerHeight / 2) * 2; 
    }
}

function createDetailedPlanet(radius, color, distance, speed, hasRing, hasMoon, mensaje) {
    const geometry = new THREE.SphereGeometry(radius, esCelular ? 12 : 32, esCelular ? 12 : 32); 
    const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, emissive: 0x000000 });
    const mesh = new THREE.Mesh(geometry, material);
    
    mesh.userData.baseColor = color; 
    mesh.userData.mensaje = mensaje; 
    
    const angle = Math.random() * Math.PI * 2;
    mesh.position.set(Math.cos(angle) * distance, 0, Math.sin(angle) * distance);
    
    let moonPivot = null;
    if (!esCelular && hasMoon) {
        moonPivot = new THREE.Group();
        const moonGeo = new THREE.SphereGeometry(radius * 0.3, 16, 16);
        const moonMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.8 });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moon.position.set(radius + 15, 0, 0); 
        moonPivot.add(moon);
        mesh.add(moonPivot); 
    }

    detailedPlanets.push({ mesh: mesh, distance, angle, speed, selfRotation: 0.01 + Math.random()*0.02, moonPivot: moonPivot });
    systemRotationGroup.add(mesh); 
    
    createOrbitRing(distance);
    if (hasRing) createSaturnRing(mesh, radius);
}

function createSaturnRing(planetMesh, planetRadius) {
    const ringGeometry = new THREE.RingGeometry(planetRadius + 10, planetRadius + 60, esCelular ? 32 : 128);
    const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.25 });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.rotation.x = Math.PI / 2.1; 
    planetMesh.add(ring); 
}

function createOrbitRing(distance) {
  const ringGeometry = new THREE.RingGeometry(distance - 0.5, distance + 0.5, esCelular ? 64 : 128);
  const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = Math.PI / 2;
  systemRotationGroup.add(ring); 
}

function createStarfield() {
    const starsGeometry = new THREE.BufferGeometry();
    const starsPositions = [];
    const numEstrellas = esCelular ? 3000 : 8000;
    for (let i = 0; i < numEstrellas; i++) { 
        starsPositions.push((Math.random() - 0.5) * 18000, (Math.random() - 0.5) * 18000, (Math.random() - 0.5) * 18000);
    }
    starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ size: esCelular ? 4 : 3, color: 0xffffff, transparent: true, opacity: 0.8 });
    starfield = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(starfield); 
    if (!esCelular) createComets();
}

let comets = [];
function createComets() {
    const cometMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
    const cometGeometry = new THREE.SphereGeometry(2, 8, 8); 
    for (let i = 0; i < 20; i++) {
        const comet = new THREE.Mesh(cometGeometry, cometMaterial.clone());
        resetComet(comet); 
        comets.push(comet);
        scene.add(comet);
    }
}
function resetComet(comet) {
    comet.position.set((Math.random() - 0.5) * 15000, (Math.random() - 0.5) * 10000, (Math.random() - 0.5) * 15000);
    const v = new THREE.Vector3((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5)).normalize().multiplyScalar(150 + Math.random() * 100);
    comet.userData.velocity = v;
    comet.scale.set(1, 1, 30);
    comet.lookAt(comet.position.clone().add(v));
    comet.material.opacity = 0; 
}

function createRealisticLocalizedFog() {
    const fogParticlesGeometry = new THREE.BufferGeometry();
    const fogPositions = []; const fogColors = [];
    const totalFogParticles = esCelular ? 300 : 600; 
    const nebulaBaseColor = new THREE.Color(0xff69b4); const nebulaAltColor = new THREE.Color(0x87cefa); 
    const origin = new THREE.Vector3(4000, 500, -4000);
    for (let i = 0; i < totalFogParticles; i++) {
        fogPositions.push(origin.x + (Math.random() - 0.5) * 2000, origin.y + (Math.random() - 0.5) * 1500, origin.z + (Math.random() - 0.5) * 2000);
        const colorRatio = Math.random();
        fogColors.push(THREE.MathUtils.lerp(nebulaBaseColor.r, nebulaAltColor.r, colorRatio), THREE.MathUtils.lerp(nebulaBaseColor.g, nebulaAltColor.g, colorRatio), THREE.MathUtils.lerp(nebulaBaseColor.b, nebulaAltColor.b, colorRatio));
    }
    fogParticlesGeometry.setAttribute('position', new THREE.Float32BufferAttribute(fogPositions, 3));
    fogParticlesGeometry.setAttribute('color', new THREE.Float32BufferAttribute(fogColors, 3));
    const fogMaterial = new THREE.PointsMaterial({ size: 50, vertexColors: true, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending });
    textureLoader.load('https://dl.dropboxusercontent.com/s/7t7i03848w481d6/nebula_background_texture.jpg', (texture) => {
        fogMaterial.map = texture; fogMaterial.needsUpdate = true;
    });
    const localizedFogMesh = new THREE.Points(fogParticlesGeometry, fogMaterial);
    scene.add(localizedFogMesh); 
}

function loadPhotoStars() {
    const totalFotos = 40;
    for (let i = 1; i <= totalFotos; i++) {
        textureLoader.load(`fotos/foto${i}.jpg`, (texture) => {
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            const distance = 1500 + Math.random() * 3000;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 2000; 
            sprite.position.set(Math.cos(angle) * distance, y, Math.sin(angle) * distance);
            sprite.scale.set(150, 150, 1);
            sprite.userData.pulseOpacity = 0.5 + Math.random() * 0.5;
            photoStars.push(sprite);
            systemRotationGroup.add(sprite); 
        }, undefined, () => {});
    }
}

function triggerSunExplosion() {
    const totalExplosionParticles = esCelular ? 250 : 500; 
    const geometry = new THREE.BufferGeometry();
    const positions = []; const velocities = []; const sizes = [];
    for (let i = 0; i < totalExplosionParticles; i++) {
        positions.push(0, 0, 0); 
        const v = new THREE.Vector3((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5));
        v.normalize().multiplyScalar(15 + Math.random() * 10); 
        velocities.push(v.x, v.y, v.z);
        sizes.push(30 + Math.random() * 20); 
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
    geometry.setAttribute('velocity', new THREE.Float32BufferAttribute(velocities, 3));
    const heartTexture = createGlowShapeTexture("💖");
    const teAmoTexture = createGlowTextTexture("TE AMO");
    const material = new THREE.PointsMaterial({ size: 50, transparent: true, opacity: 1, depthWrite: false, blending: THREE.AdditiveBlending });
    const heartParticles = new THREE.Points(geometry, material.clone()); heartParticles.material.map = heartTexture;
    const teAmoParticles = new THREE.Points(geometry, material.clone()); teAmoParticles.material.map = teAmoTexture;
    systemRotationGroup.add(heartParticles); systemRotationGroup.add(teAmoParticles); 
    const startTime = Date.now();
    activeExplosions.push({ geometry, material: heartParticles.material, teAmoMaterial: teAmoParticles.material, positions: geometry.getAttribute('position').array, velocities, totalExplosionParticles, heartMesh: heartParticles, teAmoMesh: teAmoParticles, startTime, lifeSpan: 4000 });
}

function createGlowShapeTexture(char) {
    const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d'); ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = 'white';
    ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = 15; ctx.font = '80px Arial'; ctx.fillText(char, 64, 64);
    return new THREE.CanvasTexture(canvas);
}
function createGlowTextTexture(text) {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 128;
    const ctx = canvas.getContext('2d'); ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = 'white';
    ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = 15; ctx.font = 'bold 40px Courier New'; ctx.fillText(text, 128, 64);
    return new THREE.CanvasTexture(canvas);
}

function mostrarMensajeEspecial(texto) {
    const div = document.getElementById('mensajePlaneta');
    div.innerText = texto;
    div.style.display = 'block';
    setTimeout(() => { div.style.display = 'none'; }, 4000);
}

function onWorldClick(e) {
  raycaster.setFromCamera(mouse, camera);
  
  if (raycaster.intersectObject(sun).length > 0) {
      triggerSunExplosion();
      return; 
  }
  
  if (!esCelular) {
      const intersectPlanetas = raycaster.intersectObjects(detailedPlanets.map(p => p.mesh));
      if (intersectPlanetas.length > 0) {
          const mensajeSecreto = intersectPlanetas[0].object.userData.mensaje;
          mostrarMensajeEspecial(mensajeSecreto);
      }
  }
}

function onWorldTouch(e) {
  if (e.touches.length > 0) {
    mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    onWorldClick(); 
  }
}

let prevTime = Date.now();

function animate() {
  requestAnimationFrame(animate);
  const time = Date.now();
  const delta = (time - prevTime) / 1000; 
  prevTime = time;

  // AUDIO REACTIVIDAD DEL SOL (SOLO PC)
  if (!esCelular && analyser && dataArray && !enViaje) {
      analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      for(let i = 0; i < 15; i++) sum += dataArray[i];
      let avgBass = sum / 15;
      
      let scale = 1 + (avgBass / 256) * 0.4; 
      sun.scale.set(scale, scale, scale);
      
      // AJUSTADO: El pulso con la música también será más sutil y no cegará todo
      if (bloomPass) {
          bloomPass.strength = 0.6 + (avgBass / 256) * 0.8;
      }
  } else {
      sun.scale.set(1, 1, 1); 
  }

  sun.rotation.y += 0.002;
  
  photoStars.forEach(sprite => {
      if (Math.random() < 0.01) sprite.userData.pulseOpacity = 0.6 + Math.random() * 0.4;
      sprite.material.opacity = THREE.MathUtils.lerp(sprite.material.opacity, sprite.userData.pulseOpacity, 0.05);
  });

  if (enViaje) {
      viajeProgress += delta * 1000;
      if (viajeProgress > viajeDuration) viajeProgress = viajeDuration;
      const ratio = viajeProgress / viajeDuration;
      
      const targetX = 0; const targetY = 300; const targetZ = 1100;
      const t = Math.pow(ratio, 2); 
      
      camera.position.x = THREE.MathUtils.lerp(0, targetX, t);
      camera.position.y = THREE.MathUtils.lerp(1000, targetY, t);
      camera.position.z = THREE.MathUtils.lerp(5000, targetZ, t);
      
      if (!esCelular) {
          const warpFov = Math.sin(ratio * Math.PI) * 50; 
          camera.fov = 75 + warpFov;
          camera.updateProjectionMatrix();
          starfield.rotation.z += 5 * (1 - ratio) * delta;
          const speed = 12 * (1 - ratio) + 0.1;
          systemRotationGroup.rotation.y += speed * delta;
      } else {
          starfield.rotation.y += 0.0001;
          const speed = 4 * (1 - ratio) + 0.1; 
          systemRotationGroup.rotation.y += speed * delta;
      }
  } else {
      controls.update();
      starfield.rotation.y += 0.0001;
      systemRotationGroup.rotation.y += 0.001;
      
      // --- AJUSTADO: EFECTO PARALLAX MUCHO MÁS SUTIL ---
      if (!esCelular) {
          // Cambiamos el multiplicador de 0.5 a 0.15 para que sea un movimiento muy delicado
          targetCameraX = mouseXParallax * 0.15;
          targetCameraY = -mouseYParallax * 0.15 + 300; 
          
          camera.position.x += (targetCameraX - camera.position.x) * 0.02;
          camera.position.y += (targetCameraY - camera.position.y) * 0.02;
          camera.lookAt(scene.position); 
          
          raycaster.setFromCamera(mouse, camera);
          let intersects = raycaster.intersectObjects(detailedPlanets.map(p => p.mesh));
          
          detailedPlanets.forEach(p => p.mesh.material.emissive.setHex(0x000000));
          document.body.style.cursor = 'default';

          if (intersects.length > 0) {
              intersects[0].object.material.emissive.setHex(0xff1493); 
              document.body.style.cursor = 'pointer';
          }
          if(raycaster.intersectObject(sun).length > 0) document.body.style.cursor = 'pointer';
      }
  }

  detailedPlanets.forEach(p => {
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle) * p.distance;
    p.mesh.position.z = Math.sin(p.angle) * p.distance;
    p.mesh.rotation.y += p.selfRotation; 
    
    if (p.moonPivot) {
        p.moonPivot.rotation.y += 0.04;
    }
  });
  
  if (!esCelular) {
      comets.forEach(comet => {
          comet.position.add(comet.userData.velocity.clone().multiplyScalar(delta));
          const dist = comet.position.distanceTo(scene.position);
          if (dist < 8000 && dist > 100) comet.material.opacity = Math.min(comet.material.opacity + 0.1, 1);
          else comet.material.opacity = Math.max(comet.material.opacity - 0.1, 0);
          if (dist > 18000 || Math.abs(comet.position.y) > 10000) resetComet(comet);
      });
  }

  const currentTime = Date.now();
  for (let i = activeExplosions.length - 1; i >= 0; i--) {
      const exp = activeExplosions[i];
      const elapsed = currentTime - exp.startTime;
      if (elapsed > exp.lifeSpan) {
          systemRotationGroup.remove(exp.heartMesh); systemRotationGroup.remove(exp.teAmoMesh); exp.geometry.dispose(); exp.material.dispose(); exp.teAmoMaterial.dispose();
          activeExplosions.splice(i, 1);
          continue;
      }
      const ratio = elapsed / exp.lifeSpan;
      const opacity = 1 - Math.pow(ratio, 2); 
      exp.material.opacity = opacity;
      exp.teAmoMaterial.opacity = opacity;
      for (let j = 0; j < exp.totalExplosionParticles; j++) {
          exp.positions[j * 3] += exp.velocities[j * 3]; 
          exp.positions[j * 3 + 1] += exp.velocities[j * 3 + 1]; 
          exp.positions[j * 3 + 2] += exp.velocities[j * 3 + 2]; 
      }
      exp.geometry.getAttribute('position').needsUpdate = true;
  }

  if (!esCelular && composer) {
      composer.render(); 
  } else {
      renderer.render(scene, camera); 
  }
}

window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
  if (composer && !esCelular) {
      composer.setSize(width, height);
  }
});

init();
animate();
</script>
</body>
</html>
