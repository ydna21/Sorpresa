<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Universo para Ti 💖</title>
<style>
  body { margin: 0; background: black; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  
  /* Contenedor del Canvas 3D */
  #threeCanvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

  /* Overlay de texto (HTML encima del 3D) */
  #mainContent {
    position: relative; z-index: 2; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; height: 100vh; text-align: center;
    pointer-events: none; /* Deja que el clic pase al canvas 3D si quieres */
    padding-bottom: 50px;
  }

  h1 {
    font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff1493;
    margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate;
  }

  p { font-size: 1.5rem; color: #ffb6c1; max-width: 600px; margin-top: 0; }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff69b4; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ffb6c1, 0 0 40px #ff1493; }
  }

  .btn-regresar {
    margin-top: 30px; padding: 15px 30px; font-size: 1.2rem; background: transparent;
    border: 2px solid #ff69b4; color: #ff69b4; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.5); pointer-events: auto; transition: all 0.3s;
  }
  .btn-regresar:hover { background: #ff69b4; color: white; box-shadow: 0 0 30px #ff69b4; }
</style>
</head>
<body>

<div id="threeCanvas"></div>

<div id="mainContent">
  <h1>¡Feliz Cumpleaños! 🎂💖</h1>
  <p>Eres el sol que ilumina mi universo. Que este nuevo año esté lleno de órbitas de felicidad.</p>
  <button class="btn-regresar" onclick="window.location.href='index.html'">⬅️ Regresar al inicio</button>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';

let scene, camera, renderer, controls;
let width, height, starfield, sun, planets = [];
let planetGeometries = [], orbitRings = [];

function init() {
  width = window.innerWidth;
  height = window.innerHeight;

  // 1. Escena (El "mundo" 3D)
  scene = new THREE.Scene();

  // 2. Cámara (Perspectiva para 3D)
  camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 10000);
  camera.position.set(0, 150, 400); // Elevada y alejada

  // 3. Renderer (El "motor" gráfico)
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  document.getElementById('threeCanvas').appendChild(renderer.domElement);

  // 4. Controles de Cámara (Crucial para MOVER EL UNIVERSO)
  // Permite: Clic y arrastrar para rotar, Scroll para Zoom, Clic derecho para mover el centro
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; // Efecto suave al soltar el clic
  controls.dampingFactor = 0.05;
  controls.screenSpacePanning = false; // El centro de rotación se queda en el Sol
  controls.minDistance = 100; // Zoom mínimo
  controls.maxDistance = 2000; // Zoom máximo

  // --- Creación de Objetos ---

  // A. Estrellas de fondo (Partículas 3D reales)
  createStarfield();

  // B. Sol Central (Emisivo: brilla)
  const sunGeometry = new THREE.SphereGeometry(60, 32, 32);
  const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdf00 });
  sun = new THREE.Mesh(sunGeometry, sunMaterial);
  scene.add(sun);
  
  // Pequeña luz PointLight en el Sol (proyecta sombras y resplandor)
  const sunLight = new THREE.PointLight(0xff69b4, 50, 1000); // Luz rosa resplandeciente
  scene.add(sunLight);

  // C. Planetas (Árbitas, tamaños y colores)
  const planetColors = [0xffb6c1, 0x87cefa, 0xdda0dd, 0xffdab9, 0x98fb98];
  
  for (let i = 0; i < 5; i++) {
    // Geometría del planeta
    const pRadius = 10 + Math.random() * 15;
    const pGeometry = new THREE.SphereGeometry(pRadius, 32, 32);
    // Material (básico para que se vea sin sombras complejas)
    const pMaterial = new THREE.MeshStandardMaterial({ 
        color: planetColors[i % planetColors.length], 
        emissive: planetColors[i % planetColors.length],
        emissiveIntensity: 0.2
    });
    const planet = new THREE.Mesh(pGeometry, pMaterial);
    
    // Configuración de la órbita
    const distance = 160 + i * 80; // Distancia al Sol
    const angle = Math.random() * Math.PI * 2; // Ángulo inicial aleatorio
    const speed = 0.005 + Math.random() * 0.01; // Velocidad de órbita

    planet.position.set(Math.cos(angle) * distance, 0, Math.sin(angle) * distance);
    planet.rotation.y = Math.random() * Math.PI * 2; // Rotación aleatoria del planeta
    
    // Guardamos los datos para la animación
    planets.push({ mesh: planet, distance, angle, speed, selfRotation: 0.01 + Math.random()*0.02 });
    scene.add(planet);

    // Anillo de órbita (Línea sutil)
    createOrbitRing(distance);
  }
}

// Función para crear el fondo de estrellas 3D
function createStarfield() {
  const starsGeometry = new THREE.BufferGeometry();
  const starsPositions = new Float32Array(5000 * 3); // 5000 estrellas (x, y, z)

  for (let i = 0; i < 5000 * 3; i++) {
    starsPositions[i] = (Math.random() - 0.5) * 6000; // Posición aleatoria lejana
  }
  starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));

  // Material de estrellas (Partículas)
  const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 2, sizeAttenuation: true, transparent: true, opacity: 0.8 });
  starfield = new THREE.Points(starsGeometry, starsMaterial);
  scene.add(starfield);
}

// Función para crear la línea de órbita sutil
function createOrbitRing(distance) {
  const ringGeometry = new THREE.RingGeometry(distance - 0.5, distance + 0.5, 128);
  const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = Math.PI / 2; // Ponemos el anillo plano
  scene.add(ring);
}

// Bucle de animación (El "corazón" de Three.js)
function animate() {
  requestAnimationFrame(animate);

  // 1. Actualiza controles (OrbitControls)
  controls.update();

  // 2. Anima Planetas (Órbitas y Rotación propia)
  planets.forEach(p => {
    // Órbita
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle) * p.distance;
    p.mesh.position.z = Math.sin(p.angle) * p.distance;
    
    // Rotación propia (el planeta gira sobre sí mismo)
    p.mesh.rotation.y += p.selfRotation;
  });
  
  // 3. Pequeña rotación del Sol
  sun.rotation.y += 0.002;
  
  // 4. Pequeño parpadeo del Starfield
  starfield.rotation.y += 0.0001;
  const starsArray = starfield.geometry.attributes.position.array;
  for (let i = 0; i < starsArray.length; i+=3) {
    if(Math.random() < 0.001) starsArray[i+2] += (Math.random()-0.5) * 5; // Mueve levemente en Z
  }
  starfield.geometry.attributes.position.needsUpdate = true; // Indica que se han modificado

  // 5. Renderiza la escena
  renderer.render(scene, camera);
}

// Manejo del cambio de tamaño de ventana
function onWindowResize() {
  width = window.innerWidth;
  height = window.innerHeight;
  
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  
  renderer.setSize(width, height);
}
window.addEventListener('resize', onWindowResize);

// Inicio
init();
animate();
</script>
</body>
</html>
