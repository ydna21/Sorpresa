<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Universo para Ti 💖</title>
<style>
  body { margin: 0; background: black; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  
  /* Contenedor del Canvas 3D */
  #threeCanvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

  /* Overlay de texto (HTML encima del 3D) */
  #mainContent {
    position: relative; z-index: 2; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; height: 100vh; text-align: center;
    pointer-events: none; /* Deja que el clic pase al canvas 3D */
    padding-bottom: 50px;
  }

  h1 {
    font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff1493;
    margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate;
  }

  p { font-size: 1.5rem; color: #ffb6c1; max-width: 600px; margin-top: 0; }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff69b4; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ffb6c1, 0 0 40px #ff1493; }
  }

  .btn-regresar {
    margin-top: 30px; padding: 15px 30px; font-size: 1.2rem; background: transparent;
    border: 2px solid #ff69b4; color: #ff69b4; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.5); pointer-events: auto; transition: all 0.3s;
  }
  .btn-regresar:hover { background: #ff69b4; color: white; box-shadow: 0 0 30px #ff69b4; }
</style>
</head>
<body>

<div id="threeCanvas"></div>

<div id="mainContent">
  <h1>¡Feliz Cumpleaños! 🎂💖</h1>
  <p>Eres el sol que ilumina mi universo. Que este nuevo año esté lleno de órbitas de felicidad.</p>
  <button class="btn-regresar" onclick="window.location.href='index.html'">⬅️ Regresar al inicio</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// VARIABLES GLOBALES
let scene, camera, renderer, controls;
let width, height, sun;
let detailedPlanets = []; // Nueva estructura para planetas únicos
let shootingStars = [];

function init() {
  width = window.innerWidth;
  height = window.innerHeight;

  // 1. Escena 
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000); // Fondo negro profundo

  // 2. Cámara 
  camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 10000);
  camera.position.set(0, 300, 600); // Más elevada y lejana para ver más

  // 3. Renderer 
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(width, height);
  document.getElementById('threeCanvas').appendChild(renderer.domElement);

  // 4. Controles
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; 
  controls.dampingFactor = 0.05;
  controls.minDistance = 150;
  controls.maxDistance = 4000;

  // --- Creación de Objetos ---

  // Sol Central
  const sunGeometry = new THREE.SphereGeometry(60, 32, 32);
  const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdf00 });
  sun = new THREE.Mesh(sunGeometry, sunMaterial);
  scene.add(sun);
  
  // Luces
  const sunLight = new THREE.PointLight(0xff69b4, 3, 2000); // Brillo rosa más potente
  scene.add(sunLight);
  const ambientLight = new THREE.AmbientLight(0x404040, 0.8); // Luz suave
  scene.add(ambientLight);

  // --- DISEÑO DE PLANETAS DETALLADOS ---
  // Creamos un sistema más poblado y único (8 planetas)
  
  // Planeta 1: Pequeño y rocoso (Mercurio-ish)
  createDetailedPlanet(10, 0xffb6c1, 150, 0.015);
  // Planeta 2: Medio y texturizado (Venus-ish)
  createDetailedPlanet(15, 0xdda0dd, 200, 0.012, 0.4);
  // Planeta 3: Medio y rocoso (Tierra-ish)
  createDetailedPlanet(18, 0x87cefa, 260, 0.010, 0.2);
  // Planeta 4: Pequeño y rocoso (Marte-ish)
  createDetailedPlanet(12, 0xffdab9, 310, 0.009);
  
  // Planeta 5: GIGANTE GASEOSO CON ANILLOS (Saturno-ish)
  const ringPlanetMesh = createDetailedPlanet(50, 0x98fb98, 500, 0.006, 0.1, true);
  
  // Planeta 6: Gigante gaseoso medio
  createDetailedPlanet(40, 0xd8bfd8, 650, 0.005, 0.1);
  // Planeta 7: Medio y helado
  createDetailedPlanet(30, 0xafeeee, 800, 0.004);
  // Planeta 8: Medio y helado
  createDetailedPlanet(28, 0xb0c4de, 950, 0.0035);

  // AÑADIMOS EL SISTEMA DE ESTRELLAS FUGACES
  createShootingStars();
}

// Función para crear un planeta con parámetros detallados
function createDetailedPlanet(radius, color, distance, speed, roughness=0.5, hasRing=false) {
    const geometry = new THREE.SphereGeometry(radius, 32, 32);
    const material = new THREE.MeshStandardMaterial({ color: color, roughness: roughness, metalness: 0.1 });
    const mesh = new THREE.Mesh(geometry, material);
    
    const angle = Math.random() * Math.PI * 2;
    mesh.position.set(Math.cos(angle) * distance, 0, Math.sin(angle) * distance);
    
    detailedPlanets.push({ mesh: mesh, distance, angle, speed, selfRotation: 0.01 + Math.random()*0.02 });
    scene.add(mesh);
    
    createOrbitRing(distance);

    if (hasRing) {
        createSaturnRing(mesh, radius);
    }
    
    return mesh;
}

// Función para crear un anillo alrededor de un planeta específico
function createSaturnRing(planetMesh, planetRadius) {
    // Geometría del anillo (aplanada)
    const ringGeometry = new THREE.RingGeometry(planetRadius + 10, planetRadius + 40, 128);
    
    // Material del anillo con transparencia y color sutil
    const ringMaterial = new THREE.MeshBasicMaterial({ 
        color: 0xff69b4, // Anillos rosas sutiles
        side: THREE.DoubleSide, 
        transparent: true, 
        opacity: 0.2
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    
    // Lo hacemos plano y lo inclinamos ligeramente
    ring.rotation.x = Math.PI / 2.1; 
    
    planetMesh.add(ring); // El anillo es hijo del planeta, lo sigue en su órbita
}

// Anillo de órbita (Línea sutil)
function createOrbitRing(distance) {
  const ringGeometry = new THREE.RingGeometry(distance - 0.5, distance + 0.5, 128);
  const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = Math.PI / 2; // Plano horizontal
  scene.add(ring);
}

// Crear sistema de estrellas fugaces rápidas
function createShootingStars() {
    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
    const starGeometry = new THREE.SphereGeometry(1, 4, 4);

    for (let i = 0; i < 15; i++) { // Unas cuantas más
        const star = new THREE.Mesh(starGeometry, starMaterial.clone());
        resetShootingStar(star); 
        shootingStars.push(star);
        scene.add(star);
    }
}

function resetShootingStar(star) {
    star.position.set(
        (Math.random() - 0.5) * 6000,
        (Math.random() - 0.5) * 6000,
        (Math.random() - 0.5) * 6000
    );
    star.userData.velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 60, // Más rápidas
        (Math.random() - 0.5) * 60,
        (Math.random() - 0.5) * 60
    );
    star.material.opacity = 0; 
}

// Bucle de animación 
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Animar planetas detallados
  detailedPlanets.forEach(p => {
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle) * p.distance;
    p.mesh.position.z = Math.sin(p.angle) * p.distance;
    p.mesh.rotation.y += p.selfRotation; // Rotación propia
  });
  
  // Rotación del Sol
  sun.rotation.y += 0.002;
  
  // ANIMAR ESTRELLAS FUGACES
  shootingStars.forEach(star => {
      star.position.add(star.userData.velocity);
      
      const distanceToCenter = star.position.distanceTo(scene.position);
      if (distanceToCenter < 2000 && distanceToCenter > 100) {
          star.material.opacity = Math.min(star.material.opacity + 0.1, 1);
      } else {
          star.material.opacity = Math.max(star.material.opacity - 0.1, 0);
      }
      
      if (distanceToCenter > 3000 || Math.abs(star.position.y) > 3000) {
          resetShootingStar(star);
      }
  });

  renderer.render(scene, camera);
}

// Manejo del cambio de tamaño
function onWindowResize() {
  width = window.innerWidth;
  height = window.innerHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
}
window.addEventListener('resize', onWindowResize);

// Ejecutar
init();
animate();
</script>
</body>
</html>
