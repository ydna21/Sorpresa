<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Universo para Ti 💖</title>
<style>
  body { margin: 0; background: black; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  #threeCanvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
  #mainContent {
    position: relative; z-index: 2; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; height: 100vh; text-align: center;
    pointer-events: none; padding-bottom: 50px;
  }
  h1 { font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff1493; margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate; }
  p { font-size: 1.5rem; color: #ffb6c1; max-width: 600px; margin-top: 0; }
  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff69b4; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ffb6c1, 0 0 40px #ff1493; }
  }
  .btn-regresar {
    margin-top: 30px; padding: 15px 30px; font-size: 1.2rem; background: transparent;
    border: 2px solid #ff69b4; color: #ff69b4; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.5); pointer-events: auto; transition: all 0.3s;
  }
  .btn-regresar:hover { background: #ff69b4; color: white; box-shadow: 0 0 30px #ff69b4; }
</style>
</head>
<body>

<div id="threeCanvas"></div>

<div id="mainContent">
  <h1>¡Feliz Cumpleaños! 🎂💖</h1>
  <p>Eres el sol que ilumina mi universo. Que este nuevo año esté lleno de órbitas de felicidad.</p>
  <button class="btn-regresar" onclick="window.location.href='index.html'">⬅️ Regresar al inicio</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// VARIABLES GLOBALES
let scene, camera, renderer, controls;
let width, height, sun, starfield;
let detailedPlanets = []; 
let shootingStars = [];
let photoStars = []; // Array para las fotos ultra-ligeras
const textureLoader = new THREE.TextureLoader();

function init() {
  width = window.innerWidth;
  height = window.innerHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.FogExp2(0x000000, 0.0001); // Niebla para profundidad

  camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 25000);
  camera.position.set(0, 300, 1100);

  // Optimizamos el renderer quitando sombras que no usamos
  renderer = new THREE.WebGLRenderer({ antialias: false }); // Antialias false mejora FPS
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Evita lag en pantallas HD
  document.getElementById('threeCanvas').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; 
  controls.dampingFactor = 0.05;
  controls.minDistance = 150;
  controls.maxDistance = 10000;

  // SOL CENTRAL Y LUZ (Solo usamos 2 luces en todo el escenario para evitar lag)
  const sunGeometry = new THREE.SphereGeometry(60, 32, 32);
  const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdf00 });
  sun = new THREE.Mesh(sunGeometry, sunMaterial);
  scene.add(sun);
  
  const sunLight = new THREE.PointLight(0xff69b4, 4, 3000); 
  scene.add(sunLight);
  const ambientLight = new THREE.AmbientLight(0x404040, 1.2); 
  scene.add(ambientLight);

  // PLANETAS DEL SISTEMA SOLAR
  createDetailedPlanet(10, 0xffb6c1, 150, 0.015);
  createDetailedPlanet(15, 0xdda0dd, 200, 0.012);
  createDetailedPlanet(18, 0x87cefa, 260, 0.010);
  createDetailedPlanet(12, 0xffdab9, 310, 0.009);
  createDetailedPlanet(50, 0x98fb98, 500, 0.006, true); // Gigante con anillos
  createDetailedPlanet(40, 0xd8bfd8, 650, 0.005);
  createDetailedPlanet(30, 0xafeeee, 800, 0.004);
  createDetailedPlanet(28, 0xb0c4de, 950, 0.0035);

  createStarfield();
  createLocalizedNebula();
  createShootingStars();
  
  // CARGA DE FOTOS OPTIMIZADA
  loadPhotoStars();
}

function createDetailedPlanet(radius, color, distance, speed, hasRing=false) {
    const geometry = new THREE.SphereGeometry(radius, 16, 16); // Menos polígonos = más rápido
    const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
    const mesh = new THREE.Mesh(geometry, material);
    const angle = Math.random() * Math.PI * 2;
    mesh.position.set(Math.cos(angle) * distance, 0, Math.sin(angle) * distance);
    detailedPlanets.push({ mesh: mesh, distance, angle, speed, selfRotation: 0.01 + Math.random()*0.02 });
    scene.add(mesh);
    
    // Anillo sutil
    const ringGeo = new THREE.RingGeometry(distance - 0.5, distance + 0.5, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
    const orbitRing = new THREE.Mesh(ringGeo, ringMat);
    orbitRing.rotation.x = Math.PI / 2;
    scene.add(orbitRing);

    if (hasRing) {
        const saturnRingGeo = new THREE.RingGeometry(radius + 10, radius + 40, 64);
        const saturnRingMat = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
        const saturnRing = new THREE.Mesh(saturnRingGeo, saturnRingMat);
        saturnRing.rotation.x = Math.PI / 2.1; 
        mesh.add(saturnRing); 
    }
}

function createStarfield() {
    const starsGeometry = new THREE.BufferGeometry();
    const starsPositions = [];
    for (let i = 0; i < 6000; i++) { // Reducido un poco para rendimiento
        starsPositions.push((Math.random() - 0.5) * 15000, (Math.random() - 0.5) * 15000, (Math.random() - 0.5) * 15000);
    }
    starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ size: 3, color: 0xffffff, transparent: true, opacity: 0.8 });
    starfield = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(starfield);
}

function createLocalizedNebula() {
    const nebulaMaterial = new THREE.SpriteMaterial({ 
        color: 0xff69b4, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending 
    });
    textureLoader.load('https://dl.dropboxusercontent.com/s/7t7i03848w481d6/nebula_background_texture.jpg', (texture) => {
        nebulaMaterial.map = texture;
        nebulaMaterial.needsUpdate = true;
    });
    const nebulaSprite = new THREE.Sprite(nebulaMaterial);
    nebulaSprite.position.set(4000, 500, -4000);
    nebulaSprite.scale.set(5000, 4000, 1);
    scene.add(nebulaSprite);
}

// NUEVO: SISTEMA DE FOTOS LIGERO (SPRITES)
function loadPhotoStars() {
    const totalFotos = 40;
    
    for (let i = 1; i <= totalFotos; i++) {
        // MUY IMPORTANTE EN GITHUB: La ruta debe ser EXACTA (fotos/foto1.jpg)
        textureLoader.load(`fotos/foto${i}.jpg`, 
            // Si la foto carga bien:
            (texture) => {
                // Usamos SpriteMaterial (2D) en vez de Mesh (3D). Es súper rápido.
                const material = new THREE.SpriteMaterial({ 
                    map: texture, 
                    color: 0xffffff, // Mantiene el color original de la foto
                    transparent: true 
                });
                const sprite = new THREE.Sprite(material);
                
                // Las posicionamos a media distancia para que sean fáciles de encontrar
                const distance = 1500 + Math.random() * 3000;
                const angle = Math.random() * Math.PI * 2;
                const y = (Math.random() - 0.5) * 2000; 
                sprite.position.set(Math.cos(angle) * distance, y, Math.sin(angle) * distance);
                
                // Hacemos las fotos de buen tamaño (150x150 unidades en el espacio 3D)
                sprite.scale.set(150, 150, 1);
                
                // Datos para parpadeo
                sprite.userData.pulseOpacity = 0.5 + Math.random() * 0.5;
                photoStars.push(sprite);
                scene.add(sprite);
            },
            undefined, 
            // Si hay un error al cargar (ej. no existe foto40.jpg), lo ignora sin crashear
            (error) => { console.log(`No se encontró foto${i}.jpg, saltando...`); }
        );
    }
}

function createShootingStars() {
    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const starGeometry = new THREE.SphereGeometry(2, 4, 4);
    for (let i = 0; i < 10; i++) {
        const star = new THREE.Mesh(starGeometry, starMaterial);
        resetShootingStar(star); 
        shootingStars.push(star);
        scene.add(star);
    }
}

function resetShootingStar(star) {
    star.position.set((Math.random() - 0.5) * 8000, (Math.random() - 0.5) * 8000, (Math.random() - 0.5) * 8000);
    star.userData.velocity = new THREE.Vector3((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  detailedPlanets.forEach(p => {
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle) * p.distance;
    p.mesh.position.z = Math.sin(p.angle) * p.distance;
    p.mesh.rotation.y += p.selfRotation; 
  });
  
  sun.rotation.y += 0.002;
  starfield.rotation.y += 0.0001;

  // Animación de las fotos (parpadeo suave)
  photoStars.forEach(sprite => {
      if (Math.random() < 0.01) { 
          sprite.userData.pulseOpacity = 0.6 + Math.random() * 0.4;
      }
      sprite.material.opacity = THREE.MathUtils.lerp(sprite.material.opacity, sprite.userData.pulseOpacity, 0.05);
  });

  shootingStars.forEach(star => {
      star.position.add(star.userData.velocity);
      if (star.position.distanceTo(scene.position) > 10000) resetShootingStar(star);
  });

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
});

init();
animate();
</script>
</body>
</html>
