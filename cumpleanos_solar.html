<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Universo para Ti 💖</title>
<style>
  body { margin: 0; background: black; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
  
  #mainContent {
    position: relative; z-index: 2; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100vh; text-align: center;
    pointer-events: none; /* Deja que el clic pase al canvas si quieres */
  }

  h1 {
    font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff1493;
    margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate;
  }

  p { font-size: 1.5rem; color: #ffb6c1; max-width: 600px; margin-top: 0; }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff69b4; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ffb6c1, 0 0 40px #ff1493; }
  }

  .btn-regresar {
    margin-top: 30px; padding: 15px 30px; font-size: 1.2rem; background: transparent;
    border: 2px solid #ff69b4; color: #ff69b4; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.5); pointer-events: auto; transition: all 0.3s;
  }
  .btn-regresar:hover { background: #ff69b4; color: white; box-shadow: 0 0 30px #ff69b4; }
</style>
</head>
<body>

<canvas id="solarCanvas"></canvas>

<div id="mainContent">
  <h1>¡Feliz Cumpleaños Sofía! 🎂💖</h1>
  <p>Eres el sol que ilumina mi universo. Que este nuevo año esté lleno de órbitas de felicidad.</p>
  <button class="btn-regresar" onclick="window.location.href='index.html'">⬅️ Regresar al inicio</button>
</div>

<script>
/** --- CONFIGURACIÓN DEL SISTEMA SOLAR --- **/
const canvas = document.getElementById('solarCanvas');
const ctx = canvas.getContext('2d');

let width, height, stars = [], planets = [], sun;

function init() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  stars = []; planets = [];

  // 1. Sol Central
  sun = { x: width / 2, y: height / 2, r: 50, color: '#ffdf00', glow: '#ff69b4' };

  // 2. Estrellas de fondo (muchas y brillantes)
  for (let i = 0; i < 400; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      r: Math.random() * 1.5,
      opacity: Math.random(),
      blinkSpeed: 0.005 + Math.random() * 0.02
    });
  }

  // 3. Planetas (árbitas, tamaños y colores personalizados)
  const planetColors = ['#ffb6c1', '#87cefa', '#dda0dd', '#ffdab9', '#98fb98'];
  for (let i = 0; i < 5; i++) {
    planets.push({
      distance: 120 + i * 60, // Distancia al Sol
      r: 8 + Math.random() * 10,  // Tamaño
      color: planetColors[i % planetColors.length],
      speed: 0.005 + Math.random() * 0.01, // Velocidad de órbita
      angle: Math.random() * Math.PI * 2 // Posición inicial
    });
  }
}

function draw() {
  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, width, height);

  // Dibuja Estrellas
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
    ctx.fill();
    
    // Animación de parpadeo
    s.opacity += s.blinkSpeed;
    if (s.opacity > 1 || s.opacity < 0) s.blinkSpeed *= -1;
  });

  // Dibuja Sol (con resplandor)
  ctx.shadowBlur = 50;
  ctx.shadowColor = sun.glow;
  ctx.beginPath();
  ctx.arc(sun.x, sun.y, sun.r, 0, Math.PI * 2);
  ctx.fillStyle = sun.color;
  ctx.fill();
  ctx.shadowBlur = 0; // Apaga el resplandor para los planetas

  // Dibuja Planetas y Órbitas
  planets.forEach(p => {
    // Actualiza ángulo (órbita)
    p.angle += p.speed;
    const px = sun.x + Math.cos(p.angle) * p.distance;
    const py = sun.y + Math.sin(p.angle) * p.distance;

    // Dibuja la línea de la órbita (sutil)
    ctx.beginPath();
    ctx.arc(sun.x, sun.y, p.distance, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 105, 180, 0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Dibuja el Planeta
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    
    // Pequeño resplandor en el planeta
    ctx.shadowBlur = 10;
    ctx.shadowColor = p.color;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', init);
init();
draw();
</script>
</body>
</html>
