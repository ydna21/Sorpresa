<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Universo para Ti 💖</title>
<style>
  body { margin: 0; background: black; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
  
  /* Contenedor del Canvas 3D */
  #threeCanvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

  /* Overlay de texto (HTML encima del 3D) */
  #mainContent {
    position: relative; z-index: 2; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; height: 100vh; text-align: center;
    pointer-events: none; /* Deja que el clic pase al canvas 3D */
    padding-bottom: 50px;
  }

  h1 {
    font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ff69b4, 0 0 30px #ff1493;
    margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate;
  }

  p { font-size: 1.5rem; color: #ffb6c1; max-width: 600px; margin-top: 0; }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff69b4; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ffb6c1, 0 0 40px #ff1493; }
  }

  .btn-regresar {
    margin-top: 30px; padding: 15px 30px; font-size: 1.2rem; background: transparent;
    border: 2px solid #ff69b4; color: #ff69b4; border-radius: 50px; cursor: pointer;
    box-shadow: 0 0 15px rgba(255, 105, 180, 0.5); pointer-events: auto; transition: all 0.3s;
  }
  .btn-regresar:hover { background: #ff69b4; color: white; box-shadow: 0 0 30px #ff69b4; }
</style>
</head>
<body>

<div id="threeCanvas"></div>

<div id="mainContent">
  <h1>¡Feliz Cumpleaños! 🎂💖</h1>
  <p>Eres el sol que ilumina mi universo. Que este nuevo año esté lleno de órbitas de felicidad.</p>
  <button class="btn-regresar" onclick="window.location.href='index.html'">⬅️ Regresar al inicio</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// VARIABLES GLOBALES
let scene, camera, renderer, controls;
let width, height, starfield, sun, planets = [];

function init() {
  width = window.innerWidth;
  height = window.innerHeight;

  // 1. Escena (El "mundo" 3D)
  scene = new THREE.Scene();

  // 2. Cámara (Perspectiva para 3D)
  camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 10000);
  camera.position.set(0, 150, 400); // Elevada y alejada

  // 3. Renderer (El motor gráfico)
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  document.getElementById('threeCanvas').appendChild(renderer.domElement);

  // 4. Controles para mover el universo con el Mouse
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; 
  controls.dampingFactor = 0.05;
  controls.minDistance = 100;
  controls.maxDistance = 2000;

  // --- Creación de Objetos ---

  createStarfield();

  // Sol Central
  const sunGeometry = new THREE.SphereGeometry(60, 32, 32);
  const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdf00 });
  sun = new THREE.Mesh(sunGeometry, sunMaterial);
  scene.add(sun);
  
  // Luz del Sol y luz ambiente para iluminar los planetas
  const sunLight = new THREE.PointLight(0xff69b4, 2, 1000); 
  scene.add(sunLight);
  const ambientLight = new THREE.AmbientLight(0x404040, 0.8); // Luz suave
  scene.add(ambientLight);

  // Planetas
  const planetColors = [0xffb6c1, 0x87cefa, 0xdda0dd, 0xffdab9, 0x98fb98];
  
  for (let i = 0; i < 5; i++) {
    const pRadius = 10 + Math.random() * 15;
    const pGeometry = new THREE.SphereGeometry(pRadius, 32, 32);
    // MeshStandardMaterial reacciona a la luz
    const pMaterial = new THREE.MeshStandardMaterial({ 
        color: planetColors[i % planetColors.length], 
        roughness: 0.4 
    });
    const planet = new THREE.Mesh(pGeometry, pMaterial);
    
    const distance = 160 + i * 80; 
    const angle = Math.random() * Math.PI * 2; 
    const speed = 0.005 + Math.random() * 0.01; 

    planet.position.set(Math.cos(angle) * distance, 0, Math.sin(angle) * distance);
    
    planets.push({ mesh: planet, distance, angle, speed, selfRotation: 0.01 + Math.random()*0.02 });
    scene.add(planet);

    createOrbitRing(distance);
  }
}

// Estrellas
function createStarfield() {
  const starsGeometry = new THREE.BufferGeometry();
  const starsPositions = [];

  for (let i = 0; i < 5000; i++) {
    const x = (Math.random() - 0.5) * 6000;
    const y = (Math.random() - 0.5) * 6000;
    const z = (Math.random() - 0.5) * 6000;
    starsPositions.push(x, y, z);
  }
  
  starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
  const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true, opacity: 0.8 });
  starfield = new THREE.Points(starsGeometry, starsMaterial);
  scene.add(starfield);
}

// Anillo de órbita
function createOrbitRing(distance) {
  const ringGeometry = new THREE.RingGeometry(distance - 0.5, distance + 0.5, 128);
  const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xff69b4, side: THREE.DoubleSide, transparent: true, opacity: 0.15 });
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = Math.PI / 2; // Plano horizontal
  scene.add(ring);
}

// Bucle de animación 
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  planets.forEach(p => {
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle) * p.distance;
    p.mesh.position.z = Math.sin(p.angle) * p.distance;
    p.mesh.rotation.y += p.selfRotation;
  });
  
  sun.rotation.y += 0.002;
  starfield.rotation.y += 0.0005; // Rotación lenta de las estrellas

  renderer.render(scene, camera);
}

function onWindowResize() {
  width = window.innerWidth;
  height = window.innerHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
}
window.addEventListener('resize', onWindowResize);

// Ejecutar
init();
animate();
</script>
</body>
</html>
